services:

  mosquitto-edge:
    image: eclipse-mosquitto:2
    container_name: mqtt-edge
    restart: unless-stopped
    ports:
      - "1883:1883"
    environment:
      TZ: ${TZ}
    volumes:
      - /opt/docker/appdata/mosquitto-edge/config:/mosquitto/config:ro
      - /opt/docker/.secrets/mosquitto-edge/passwordfile:/mosquitto/secrets/passwordfile:ro
      - /opt/docker/appdata/mosquitto-edge/data:/mosquitto/data
      - /opt/docker/appdata/mosquitto-edge/log:/mosquitto/log
    healthcheck:
      # Keep the container healthcheck deterministic and independent of MQTT ACLs/secrets.
      # Credentialed publish/subscribe smoke tests are run from the host during bootstrap.
      test: ["CMD-SHELL", "pidof mosquitto >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  homeassistant-spoke:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-spoke
    restart: unless-stopped
    network_mode: host
    privileged: true
    depends_on:
      mosquitto-edge:
        condition: service_started
    environment:
      TZ: ${TZ}
    volumes:
      - /opt/docker/appdata/homeassistant-spoke/config:/config
      - /run/dbus/systemd:/run/dbus/systemd:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

