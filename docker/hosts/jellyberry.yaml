services:

  portfolio-mission-control-v2:
    build:
      context: /home/jellybot/portfolio-intel
      dockerfile: Dockerfile
    image: portfolio-mission-control-v2:latest
    container_name: portfolio-mission-control-v2
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      PORTFOLIO_INTEL_ROOT: /app
      HERMES_ENV_FILE: /run/secrets/hermes_env
      REFRESH_INTERVAL_SECONDS: "14400"
    secrets:
      - hermes_env
    volumes:
      - /home/jellybot/portfolio-intel/config:/app/config:ro
      - /home/jellybot/portfolio-intel/docs:/app/docs:ro
      - /home/jellybot/portfolio-intel/data:/app/data:ro
      - /opt/docker/appdata/portfolio-mission-control-v2/data:/app/mission-control-v2/data

  sc401-study-hub:
    build:
      context: /home/jellybot/sc-100-prep/study-web
      dockerfile: Dockerfile
    image: study-web-sc401-study-hub:latest
    container_name: sc401-study-hub
    restart: unless-stopped
    ports:
      - "8791:80"

  image-pastebin:
    build:
      context: /home/jellybot/image-pastebin
      dockerfile: Dockerfile
    image: image-pastebin-image-pastebin:latest
    container_name: image-pastebin
    restart: unless-stopped
    ports:
      - "8792:8792"
    environment:
      PORT: "8792"
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_MB: "25"
    volumes:
      - /opt/docker/appdata/image-pastebin/uploads:/data/uploads


  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    environment:
      DOZZLE_HOSTNAME: jellyberry
      TZ: ${TZ}
    ports:
      - "7007:7007"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro


  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - /etc/alloy/config.alloy
    environment:
      HOSTNAME: jellyberry
      LOKI_PUSH_URL: http://jellybase:3100/loki/api/v1/push
      TZ: ${TZ}
    extra_hosts:
      - "jellybase=100.125.86.118"
    ports:
      - "12345:12345"
    volumes:
      - /opt/docker/appdata/alloy/config/config.alloy:/etc/alloy/config.alloy:ro
      - /opt/docker/appdata/alloy/data:/var/lib/alloy/data
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

secrets:
  hermes_env:
    file: /home/jellybot/.hermes/.env
