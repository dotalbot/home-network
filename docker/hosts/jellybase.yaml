services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: "jellyhome,jellybase,jellyhome.cheetah-iwato.ts.net,jellybase.cheetah-iwato.ts.net,localhost,127.0.0.1,192.168.1.1,192.168.1.2,100.90.175.59,100.125.86.118,jellyhome:80,jellybase:80,jellyhome.cheetah-iwato.ts.net:80,jellybase.cheetah-iwato.ts.net:80,localhost:80,127.0.0.1:80,192.168.1.1:80,192.168.1.2:80,100.90.175.59:80,100.125.86.118:80,jellyhome:3000,jellybase:3000,localhost:3000,127.0.0.1:3000"

    volumes:
      - /opt/docker/appdata/homepage:/app/config

  portainer-agent:
    image: portainer/agent:lts
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      AGENT_SECRET: ${PORTAINER_AGENT_SECRET}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    environment:
      DOZZLE_HOSTNAME: jellybase
      TZ: ${TZ}
    ports:
      - "7007:7007"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - /opt/docker/appdata/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/docker/appdata/prometheus/config/rules:/etc/prometheus/rules:ro
      - /opt/docker/appdata/prometheus/data:/prometheus
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://jellybase:9093"
    volumes:
      - /opt/docker/appdata/alertmanager/config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /opt/docker/appdata/alertmanager/data:/alertmanager
    depends_on:
      alertmanager-discord-bridge:
        condition: service_healthy

  alertmanager-discord-bridge:
    image: python:3.12-alpine
    container_name: alertmanager-discord-bridge
    restart: unless-stopped
    command:
      - python
      - /app/bridge.py
    environment:
      TZ: ${TZ}
      DISCORD_WEBHOOK_FILE: /run/secrets/alertmanager_discord_webhook_url
    expose:
      - "9094"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9094/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    secrets:
      - alertmanager_discord_webhook_url
    volumes:
      - /opt/docker/appdata/alertmanager-discord-bridge/bridge.py:/app/bridge.py:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
    volumes:
      - /opt/docker/appdata/grafana:/var/lib/grafana
      - /opt/docker/appdata/grafana-provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - /opt/docker/appdata/loki/config/loki.yml:/etc/loki/loki.yml:ro
      - /opt/docker/appdata/loki/data:/loki

  mqtt-exporter:
    image: kpetrem/mqtt-exporter:latest
    container_name: mqtt-exporter
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      TZ: ${TZ}
      MQTT_ADDRESS: 192.168.1.1
      MQTT_PORT: "1883"
      MQTT_TOPIC: home/sensors/jellyoffice/json
      MQTT_USERNAME: mqtt-exporter
      MQTT_PASSWORD_FILE: /run/secrets/mqtt_exporter_password
      MQTT_CLIENT_ID: jellybase-mqtt-exporter
      KEEP_FULL_TOPIC: "True"
      EXPOSE_LAST_SEEN: "True"
      MQTT_METRICS_EXPIRE_SECONDS: "300"
      LOG_LEVEL: INFO
    secrets:
      - mqtt_exporter_password

  central-postgres:
    image: postgres:17-alpine
    container_name: central-postgres
    restart: unless-stopped
    ports:
      - "192.168.1.2:${POSTGRES_PORT:-5432}:5432"
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - password_encryption=scram-sha-256
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_superuser_password
    volumes:
      - /opt/docker/appdata/postgres/data:/var/lib/postgresql/data
      - /opt/docker/appdata/postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - /opt/docker/appdata/postgres/logical-dumps:/logical-dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  crawl4ai:
    image: unclecode/crawl4ai:0.8.6
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "192.168.1.2:11235:11235"
    environment:
      TZ: ${TZ}
      SECRET_KEY: ${CRAWL4AI_JWT_SECRET:?set CRAWL4AI_JWT_SECRET in /opt/docker/.env}
    volumes:
      - /opt/docker/.secrets/crawl4ai/config.yml:/app/config.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  jellyfood-web:
    build:
      context: /home/jellylady/repo/jellyfood
      dockerfile: Dockerfile
    image: jellyfood-web:latest
    container_name: jellyfood-web
    restart: unless-stopped
    ports:
      - "8793:80"

  jellyfood-api:
    build:
      context: /home/jellylady/repo/jellyfood
      dockerfile: packages/api/Dockerfile
    image: jellyfood-api:latest
    container_name: jellyfood-api
    restart: unless-stopped
    ports:
      - "8794:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/foods.db
      - PORT=3000
    volumes:
      - /opt/docker/appdata/jellyfood-api:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: ${TZ}
    volumes:
      - /opt/docker/appdata/homeassistant/config:/config
      - /run/dbus/systemd:/run/dbus/systemd:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  network-map:
    build:
      context: /home/jellyfish/repo/home-network/docker/network-map
      dockerfile: Dockerfile
    image: network-map:latest
    container_name: network-map
    restart: unless-stopped
    ports:
      - "8788:80"
    volumes:
      - /opt/docker/appdata/network-map/site:/usr/share/nginx/html:ro
    depends_on:
      - prometheus
      - alertmanager

  webtop-jellybase:
    image: lscr.io/linuxserver/webtop:latest
    container_name: webtop-jellybase
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "192.168.1.2:${WEBTOP_JELLYBASE_PORT:-30301}:3001"
      - "100.125.86.118:${WEBTOP_JELLYBASE_PORT:-30301}:3001"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ}
      CUSTOM_USER: ${WEBTOP_USER:-dominic}
      FILE__PASSWORD: /run/secrets/webtop_password
      TITLE: Jellybase Webtop
      HARDEN_DESKTOP: "true"
      START_DOCKER: "false"
    secrets:
      - source: webtop_jellybase_password
        target: webtop_password
    volumes:
      - /opt/docker/appdata/webtop-jellybase/config:/config
    security_opt:
      - no-new-privileges:true

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - /etc/alloy/config.alloy
    environment:
      HOSTNAME: jellybase
      LOKI_PUSH_URL: http://loki:3100/loki/api/v1/push
      TZ: ${TZ}
    ports:
      - "12345:12345"
    volumes:
      - /opt/docker/appdata/alloy/config/config.alloy:/etc/alloy/config.alloy:ro
      - /opt/docker/appdata/alloy/data:/var/lib/alloy/data
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

secrets:
  postgres_superuser_password:
    file: /opt/docker/.secrets/postgres_superuser_password
  alertmanager_discord_webhook_url:
    file: /opt/docker/.secrets/alertmanager/discord_webhook_url
  mqtt_exporter_password:
    file: /opt/docker/.secrets/mqtt-exporter/password
  webtop_jellybase_password:
    file: /opt/docker/.secrets/webtop-jellybase/password
