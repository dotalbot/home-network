services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: "jellyhome,jellybase,jellyhome.cheetah-iwato.ts.net,jellybase.cheetah-iwato.ts.net,localhost,127.0.0.1,192.168.1.1,192.168.1.2,100.90.175.59,100.125.86.118,jellyhome:80,jellybase:80,jellyhome.cheetah-iwato.ts.net:80,jellybase.cheetah-iwato.ts.net:80,localhost:80,127.0.0.1:80,192.168.1.1:80,192.168.1.2:80,100.90.175.59:80,100.125.86.118:80,jellyhome:3000,jellybase:3000,localhost:3000,127.0.0.1:3000"

    volumes:
      - /opt/docker/appdata/homepage:/app/config

  portainer-agent:
    image: portainer/agent:lts
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      AGENT_SECRET: ${PORTAINER_AGENT_SECRET}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    environment:
      DOZZLE_HOSTNAME: jellybase
      TZ: ${TZ}
    ports:
      - "7007:7007"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - /opt/docker/appdata/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/docker/appdata/prometheus/data:/prometheus

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
    volumes:
      - /opt/docker/appdata/grafana:/var/lib/grafana
      - /opt/docker/appdata/grafana-provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - /opt/docker/appdata/loki/config/loki.yml:/etc/loki/loki.yml:ro
      - /opt/docker/appdata/loki/data:/loki

  central-postgres:
    image: postgres:17-alpine
    container_name: central-postgres
    restart: unless-stopped
    ports:
      - "192.168.1.2:${POSTGRES_PORT:-5432}:5432"
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_superuser_password
    volumes:
      - /opt/docker/appdata/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: ${TZ}
    volumes:
      - /opt/docker/appdata/homeassistant/config:/config
      - /run/dbus/systemd:/run/dbus/systemd:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

secrets:
  postgres_superuser_password:
    file: /opt/docker/.secrets/postgres_superuser_password
