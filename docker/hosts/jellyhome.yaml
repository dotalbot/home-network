services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: "jellyhome,jellybase,jellyhome.cheetah-iwato.ts.net,jellybase.cheetah-iwato.ts.net,localhost,127.0.0.1,192.168.1.1,192.168.1.2,100.90.175.59,100.125.86.118,jellyhome:80,jellybase:80,jellyhome.cheetah-iwato.ts.net:80,jellybase.cheetah-iwato.ts.net:80,localhost:80,127.0.0.1:80,192.168.1.1:80,192.168.1.2:80,100.90.175.59:80,100.125.86.118:80,jellyhome:3000,jellybase:3000,localhost:3000,127.0.0.1:3000"
    volumes:
      - /opt/docker/appdata/homepage:/app/config

  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    environment:
      AGENT_SECRET: ${PORTAINER_AGENT_SECRET}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/appdata/portainer:/data

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: ${TZ}
      DOZZLE_REMOTE_AGENT: "192.168.1.2:7007|jellybase|HomeLab,192.168.1.159:7007|jellyberry|HomeLab"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ}
    volumes:
      - /opt/docker/appdata/mosquitto/config:/mosquitto/config
      - /opt/docker/appdata/mosquitto/data:/mosquitto/data
      - /opt/docker/appdata/mosquitto/log:/mosquitto/log

  manyfold-valkey:
    image: valkey/valkey:8-alpine
    container_name: manyfold-valkey
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - "yes"
    volumes:
      - /opt/docker/appdata/manyfold/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  manyfold:
    image: lscr.io/linuxserver/manyfold:latest
    container_name: manyfold
    restart: unless-stopped
    depends_on:
      manyfold-valkey:
        condition: service_healthy
    ports:
      - "${MANYFOLD_BIND_IP:-192.168.1.1}:${MANYFOLD_PORT:-3214}:3214"
    environment:
      PUID: "${MANYFOLD_PUID:-1000}"
      PGID: "${MANYFOLD_PGID:-1000}"
      TZ: ${TZ}
      FILE__DATABASE_URL: /run/secrets/manyfold_database_url
      REDIS_URL: redis://manyfold-valkey:6379/1
      FILE__SECRET_KEY_BASE: /run/secrets/manyfold_secret_key_base
    secrets:
      - manyfold_database_url
      - manyfold_secret_key_base
    volumes:
      - /opt/docker/appdata/manyfold/config:/config
      - /home/jellyfish/media/Primary_5TB/3D_models:/libraries/3D_models
    security_opt:
      - no-new-privileges:true


  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - /etc/alloy/config.alloy
    environment:
      HOSTNAME: jellyhome
      TZ: ${TZ}
    ports:
      - "12345:12345"
    volumes:
      - /opt/docker/appdata/alloy/config/config.alloy:/etc/alloy/config.alloy:ro
      - /opt/docker/appdata/alloy/data:/var/lib/alloy/data
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

secrets:
  postgres_manyfold_password:
    file: /opt/docker/.secrets/postgres_manyfold_password
  manyfold_database_url:
    file: /opt/docker/.secrets/manyfold_database_url
  manyfold_secret_key_base:
    file: /opt/docker/.secrets/manyfold_secret_key_base
