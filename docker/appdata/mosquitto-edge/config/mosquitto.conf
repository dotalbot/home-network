# Edge MQTT broker for jellydisp Meross/energy spoke.
# Credentials are host-local in /opt/docker/.secrets/mosquitto-edge/passwordfile.
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_timestamp true

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/secrets/passwordfile
acl_file /mosquitto/config/aclfile

# Keep retained state deliberate. HA-spoke publishes the latest clean state;
# full outage history belongs in HA recorder or a later edge SQLite logger.
