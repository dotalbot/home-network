# Managed by home-network. Runtime path: /opt/docker/appdata/postgres/config/pg_hba.conf
#
# Policy: central Postgres is published on jellybase LAN IP only and accepts
# password-authenticated host connections only from approved initial clients:
#   - jellybase  / 192.168.1.2
#   - jellyhome  / 192.168.1.1
#
# This file is database-level access control. Pair it with host firewall rules
# so non-approved LAN clients cannot reach TCP/5432 at all.

# Local container/admin access for docker exec health checks and dumps.
local   all             all                                     trust

# Loopback inside the container.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Approved LAN clients.
host    all             all             192.168.1.2/32          scram-sha-256
host    all             all             192.168.1.1/32          scram-sha-256

# Explicitly reject every other IPv4 source.
host    all             all             0.0.0.0/0               reject
