groups:
  - name: home-network-backups
    rules:
      - alert: BorgmaticLastRunFailed
        expr: borgmatic_last_run_success{job="node_exporter"} == 0
        for: 5m
        labels:
          severity: critical
          category: backup
        annotations:
          summary: "Borgmatic last run failed on {{ $labels.host }}"
          description: "The last Borgmatic status exported by {{ $labels.host }} reports failure. Check Loki logs and the MQTT/Discord backup event thread."

      - alert: BorgmaticMetricsStale
        expr: time() - borgmatic_last_run_timestamp_seconds{job="node_exporter"} > 93600
        for: 15m
        labels:
          severity: warning
          category: backup
        annotations:
          summary: "Borgmatic metrics are stale on {{ $labels.host }}"
          description: "No fresh Borgmatic run timestamp has been exported for more than 26 hours. Confirm the managed systemd timer and recent logs."

      - alert: BorgmaticMetricsMissing
        expr: up{job="node_exporter"} == 1 unless on (instance) borgmatic_last_run_timestamp_seconds{job="node_exporter"}
        for: 30m
        labels:
          severity: warning
          category: backup
        annotations:
          summary: "Borgmatic metrics are missing for {{ $labels.monitored_host }}"
          description: "node_exporter is up, but Borgmatic textfile metrics are absent for 30 minutes. Check the managed backup timer, textfile collector path, and recent Borgmatic status export."

  - name: home-network-host-health
    rules:
      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 5m
        labels:
          severity: warning
          category: host
        annotations:
          summary: "node_exporter is down for {{ $labels.monitored_host }}"
          description: "Prometheus cannot scrape node_exporter on {{ $labels.monitored_host }}. Host performance, disk-health, and sensor telemetry may be missing."

      - alert: HostTelemetryUnreachable
        expr: count by (monitored_host) (up{job=~"node_exporter|alloy",monitored_host!=""} == 0) >= 2
        for: 5m
        labels:
          severity: critical
          category: host
        annotations:
          summary: "Host appears unreachable: {{ $labels.monitored_host }}"
          description: "Both node_exporter and Alloy scrapes are down for this host. Treat this as likely host/network unreachable, then confirm power, LAN/Tailscale reachability, and SSH before chasing individual exporters."

      - alert: NodeTextfileScrapeError
        expr: node_textfile_scrape_error{job="node_exporter"} > 0
        for: 10m
        labels:
          severity: warning
          category: host
        annotations:
          summary: "node_exporter textfile scrape errors on {{ $labels.monitored_host }}"
          description: "node_exporter cannot parse one or more textfile collector files. Disk, backup, scheduled-ops, or log-signal alert inputs may be stale or missing until the bad .prom file is fixed."

      - alert: FilesystemSpaceLow
        expr: |
          100 * (
            node_filesystem_avail_bytes{job="node_exporter",fstype!~"tmpfs|overlay|squashfs|ramfs",mountpoint!~"/run.*|/var/lib/docker/.*"}
            /
            node_filesystem_size_bytes{job="node_exporter",fstype!~"tmpfs|overlay|squashfs|ramfs",mountpoint!~"/run.*|/var/lib/docker/.*"}
          ) < 10
        for: 15m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Filesystem space low on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: "Less than 10% filesystem space is available. Check Docker/appdata growth, logs, backups, and old images."

      - alert: FilesystemInodesLow
        expr: |
          100 * (
            node_filesystem_files_free{job="node_exporter",fstype!~"tmpfs|overlay|squashfs|ramfs",mountpoint!~"/run.*|/var/lib/docker/.*"}
            /
            node_filesystem_files{job="node_exporter",fstype!~"tmpfs|overlay|squashfs|ramfs",mountpoint!~"/run.*|/var/lib/docker/.*"}
          ) < 10
        for: 15m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Filesystem inodes low on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: "Less than 10% filesystem inodes are available. Check for runaway small-file generation."

      - alert: DiskHealthFailure
        expr: home_network_disk_health_status{job="node_exporter"} == 0
        for: 10m
        labels:
          severity: critical
          category: disk
        annotations:
          summary: "Disk health failure on {{ $labels.host }} {{ $labels.device }}"
          description: "The sanitized disk-health probe reports failure. Check the host directly; dashboards intentionally avoid exposing serials/raw SMART JSON."

      - alert: DiskHealthUnknown
        expr: home_network_disk_health_status{job="node_exporter"} == -1
        for: 24h
        labels:
          severity: info
          category: disk
        annotations:
          summary: "Disk health unknown on {{ $labels.host }} {{ $labels.device }}"
          description: "Disk-health status has remained unknown for 24h. This can be expected for unsupported Pi/USB/microSD paths, but should stay explicit."

      - alert: UnexpectedUnknownDiskDeviceChange
        expr: home_network_disk_health_unknown_devices{job="node_exporter"} > 0 and changes(home_network_disk_health_unknown_devices{job="node_exporter"}[24h]) > 0
        for: 12h
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Unknown disk-health device count changed on {{ $labels.host }}"
          description: "The disk-health probe has a nonzero unknown-device count that changed within the last day and stayed present for 12 hours. Expected Pi/USB gaps should be documented; otherwise inspect lsblk/smartctl/nvme output for changed device names or unsupported storage."

      - alert: DiskHealthProbeStale
        expr: time() - home_network_disk_health_last_run_timestamp_seconds{job="node_exporter"} > 7200
        for: 15m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Disk-health probe is stale on {{ $labels.host }}"
          description: "The disk-health textfile collector has not written fresh metrics for more than 2 hours. Check home-network-disk-health.timer/service."

      - alert: DiskHealthProbeFailed
        expr: home_network_disk_health_probe_success{job="node_exporter"} == 0
        for: 10m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Disk-health probe failed on {{ $labels.host }}"
          description: "The disk-health textfile collector ran but reported failure. Check home-network-disk-health.service logs and verify smartctl/nvme/lsblk access on the host."

      - alert: HostTemperatureHigh
        expr: max by (instance) ((node_hwmon_temp_celsius{job="node_exporter"}) or (node_thermal_zone_temp{job="node_exporter"})) > 80
        for: 10m
        labels:
          severity: warning
          category: sensor
        annotations:
          summary: "High host temperature on {{ $labels.instance }}"
          description: "A hwmon or thermal-zone sensor is above 80C for 10 minutes. Check cooling, load, and the Host Observability dashboard."

      - alert: PiTemperatureHigh
        expr: home_network_pi_temperature_celsius{job="node_exporter"} > 75
        for: 10m
        labels:
          severity: warning
          category: sensor
        annotations:
          summary: "High Raspberry Pi temperature on {{ $labels.host }}"
          description: "The vcgencmd temperature probe is above 75C for 10 minutes. Check case airflow, fan state, and throttling flags."

      - alert: PiUndervoltageNow
        expr: home_network_pi_undervoltage_now{job="node_exporter"} == 1
        for: 2m
        labels:
          severity: critical
          category: sensor
        annotations:
          summary: "Raspberry Pi undervoltage now on {{ $labels.host }}"
          description: "The Pi reports active undervoltage. Check PSU/cable and storage risk immediately."

      - alert: PiThrottlingOrUndervoltageSeen
        expr: max_over_time(home_network_pi_undervoltage_seen{job="node_exporter"}[1h]) > 0 or max_over_time(home_network_pi_throttled_seen{job="node_exporter"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
          category: sensor
        annotations:
          summary: "Raspberry Pi throttling/undervoltage observed on {{ $labels.host }}"
          description: "The Pi has reported throttling or undervoltage within the last hour. Review power, thermal state, and storage health."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: warning
          service: loki
        annotations:
          summary: "Loki is down"
          description: "Prometheus cannot scrape Loki on jellybase for more than 2 minutes."

      - alert: AlloyDown
        expr: up{job="alloy"} == 0
        for: 5m
        labels:
          severity: warning
          service: alloy
        annotations:
          summary: "Alloy is down on {{ $labels.monitored_host }}"
          description: "Alloy log shipping agent {{ $labels.monitored_host }} has been unreachable for more than 5 minutes."

      - alert: Seedit4meReverseTunnelDown
        expr: home_network_seedit4me_tunnel_success{job="node_exporter",host="jellyberry"} == 0
        for: 2m
        labels:
          severity: warning
          category: remote-access
          service: seedit4me-reverse-tunnel
        annotations:
          summary: "Seedit4.me reverse tunnel is down on {{ $labels.host }}"
          description: "The autossh reverse tunnel healthcheck failed. Check home-network-seedit4me-reverse-tunnel.service and home-network-seedit4me-tunnel-healthcheck.service on jellyberry."

      - alert: Seedit4meReverseTunnelHealthcheckStale
        expr: time() - home_network_seedit4me_tunnel_last_run_timestamp_seconds{job="node_exporter",host="jellyberry"} > 600
        for: 5m
        labels:
          severity: warning
          category: remote-access
          service: seedit4me-reverse-tunnel
        annotations:
          summary: "Seedit4.me reverse tunnel healthcheck is stale on {{ $labels.host }}"
          description: "The seedit4me tunnel textfile metric has not refreshed for more than 10 minutes. Check home-network-seedit4me-tunnel-healthcheck.timer on jellyberry."

  - name: home-network-scheduled-operations
    rules:
      - alert: HomeNetworkScheduledOpsCheckFailed
        expr: |
          home_network_scheduled_check_overall_success{job="node_exporter"} == 0
          and on() sum(home_network_scheduled_check_success{job="node_exporter",check!~"docker_drift|backup_policy|borg_check|dashboard_.*_render"} == 0) > 0
        for: 10m
        labels:
          severity: warning
          category: scheduled-ops
        annotations:
          summary: "Home-network scheduled operational checks failed"
          description: "The scheduled operations check runner exported a failed status outside the specific container-drift, backup-policy, Borg, and dashboard-render alerts. Query home_network_scheduled_check_success and check the systemd journal for home-network-scheduled-ops-check.service on jellybase."

      - alert: HomeNetworkContainerDrift
        expr: home_network_scheduled_check_success{job="node_exporter",check="docker_drift"} == 0
        for: 10m
        labels:
          severity: warning
          category: scheduled-ops
          service: docker-drift
        annotations:
          summary: "Home-network container drift detected"
          description: "The scheduled drift-check found running containers that do not match source-managed Compose/inventory expectations. Review home_network_scheduled_check_info and run scripts/drift-check from the primary jellybase checkout."

      - alert: HomeNetworkScheduledBackupPolicyCheckFailed
        expr: home_network_scheduled_check_success{job="node_exporter",check="backup_policy"} == 0
        for: 10m
        labels:
          severity: warning
          category: scheduled-ops
          service: backup-policy
        annotations:
          summary: "Home-network backup policy check failed"
          description: "The scheduled backup-policy check failed. This usually means a service has missing or unknown backup metadata or a referenced backup class lacks a restore rule."

      - alert: HomeNetworkScheduledBorgCheckFailed
        expr: home_network_scheduled_check_success{job="node_exporter",check="borg_check"} == 0
        for: 10m
        labels:
          severity: warning
          category: scheduled-ops
          service: borg-check
        annotations:
          summary: "Home-network Borg check failed"
          description: "The scheduled Borg prerequisite check failed. Verify Borg is installed, the host is enabled in inventory/backups.yml, and important paths still exist."

      - alert: HomeNetworkScheduledDashboardRenderCheckFailed
        expr: home_network_scheduled_check_success{job="node_exporter",check=~"dashboard_.*_render"} == 0
        for: 10m
        labels:
          severity: warning
          category: scheduled-ops
          service: dashboard-render
        annotations:
          summary: "Home-network dashboard render validation failed"
          description: "Optional scheduled dashboard render validation failed in the temporary checkout. Run just scheduled-ops-check-with-render-validation from the primary checkout and fix the source renderer or inventory input."

      - alert: HomeNetworkScheduledOpsCheckStale
        expr: time() - home_network_scheduled_check_last_run_timestamp_seconds{job="node_exporter"} > 7200
        for: 15m
        labels:
          severity: warning
          category: scheduled-ops
        annotations:
          summary: "Home-network scheduled operational checks are stale"
          description: "The scheduled operations check textfile metric has not been refreshed for more than 2 hours. Check home-network-scheduled-ops-check.timer/service on jellybase."

  - name: home-network-log-pipeline
    rules:
      - alert: AlloyCannotReachLoki
        expr: |
          sum by (monitored_host, instance) (
            rate(loki_write_request_duration_seconds_count{job="alloy",status_code="-1"}[15m])
          ) > 0
        for: 15m
        labels:
          severity: critical
          category: log-pipeline
          service: alloy
        annotations:
          summary: "Alloy cannot reach Loki from {{ $labels.monitored_host }}"
          description: "Alloy on {{ $labels.monitored_host }} is failing to push logs to Loki. This usually means the Loki push URL or network path is wrong, so host/container logs are being lost."

      - alert: AlloyDroppingLogEntries
        expr: |
          sum by (monitored_host, instance, reason) (
            rate(loki_write_dropped_entries_total{job="alloy",reason=~"ingester_error|queue_is_full|rate_limited|stream_limited"}[15m])
          ) > 0
        for: 15m
        labels:
          severity: warning
          category: log-pipeline
          service: alloy
        annotations:
          summary: "Alloy is dropping log entries on {{ $labels.monitored_host }}"
          description: "Alloy on {{ $labels.monitored_host }} is dropping log entries with reason {{ $labels.reason }}. Check Loki capacity, rate limits, and the host's Alloy metrics."

      - alert: LokiDiscardingLogSamples
        expr: |
          sum by (monitored_host, reason) (
            rate(loki_discarded_samples_total{job="loki"}[15m])
          ) > 0
        for: 15m
        labels:
          severity: warning
          category: log-pipeline
          service: loki
        annotations:
          summary: "Loki is discarding log samples on {{ $labels.monitored_host }}"
          description: "Loki is actively discarding log samples with reason {{ $labels.reason }}. Investigate retention limits, ingestion rate limits, or stale/backfilled log pushes before more log history is lost."

      - alert: HostSystemdFailedUnits
        expr: home_network_systemd_failed_units{job="node_exporter"} > 0
        for: 20m
        labels:
          severity: warning
          category: host-log-signal
        annotations:
          summary: "Failed systemd units on {{ $labels.host }}"
          description: "{{ $value | humanize }} systemd units have remained failed on {{ $labels.host }} for at least 20 minutes. Review the host journal before the failure becomes background wallpaper."

      - alert: HostJournalKernelErrors
        expr: home_network_journal_kernel_error_count{job="node_exporter",window="15m"} > 0
        for: 10m
        labels:
          severity: critical
          category: host-log-signal
        annotations:
          summary: "Kernel error signals on {{ $labels.host }}"
          description: "The last 15 minutes of kernel journal on {{ $labels.host }} contain error-priority lines. Check dmesg/journalctl -k and recent hardware or filesystem events."

      - alert: HostJournalStorageErrors
        expr: home_network_journal_storage_error_count{job="node_exporter",window="15m"} > 0
        for: 10m
        labels:
          severity: critical
          category: host-log-signal
        annotations:
          summary: "Storage-related journal errors on {{ $labels.host }}"
          description: "The last 15 minutes of journal on {{ $labels.host }} contain storage/filesystem error patterns. Check disk health, cabling, power, and filesystem state."

      - alert: HostJournalOomEvents
        expr: home_network_journal_oom_event_count{job="node_exporter",window="15m"} > 0
        for: 10m
        labels:
          severity: warning
          category: host-log-signal
        annotations:
          summary: "OOM events seen on {{ $labels.host }}"
          description: "The last 15 minutes of journal on {{ $labels.host }} contain out-of-memory or oom-kill events. Check memory pressure, swap, and the offending service."

      - alert: HostJournalErrorBurst
        expr: home_network_journal_error_count{job="node_exporter",window="15m"} >= 20
        for: 15m
        labels:
          severity: warning
          category: host-log-signal
        annotations:
          summary: "Journal error burst on {{ $labels.host }}"
          description: "{{ $value | humanize }} error-priority journal lines were seen in the last 15 minutes on {{ $labels.host }}. This is intentionally thresholded to avoid alert spam while still catching real trouble."

      - alert: HostLogSignalProbeStale
        expr: time() - home_network_log_signal_last_run_timestamp_seconds{job="node_exporter"} > 1800
        for: 15m
        labels:
          severity: warning
          category: host-log-signal
        annotations:
          summary: "Host log-signal probe is stale on {{ $labels.host }}"
          description: "The host log-signal textfile probe has not refreshed for more than 30 minutes on {{ $labels.host }}. Alerting intelligence for failed units, kernel errors, and OOM events may be stale."

      - alert: HostLogSignalProbeFailed
        expr: home_network_log_signal_probe_success{job="node_exporter"} == 0
        for: 10m
        labels:
          severity: warning
          category: host-log-signal
        annotations:
          summary: "Host log-signal probe failed on {{ $labels.host }}"
          description: "The host log-signal textfile probe last run failed on {{ $labels.host }}. Check systemd timer/service logs and journalctl access."
