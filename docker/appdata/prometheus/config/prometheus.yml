global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: jellybase-prometheus
    site: home-network

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          monitored_host: jellybase
      - targets:
          - jellyhome:9100
        labels:
          monitored_host: jellyhome
      - targets:
          - jellyberry:9100
        labels:
          monitored_host: jellyberry
      - targets:
          - 192.168.1.75:9100
        labels:
          monitored_host: jellybackup

  - job_name: node_exporter_remote
    scrape_interval: 5m
    scrape_timeout: 30s
    static_configs:
      - targets:
          - 100.120.89.41:9100
        labels:
          monitored_host: jellysa
          site: south-africa
          access_path: tailscale
    relabel_configs:
      - target_label: job
        replacement: node_exporter

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
        labels:
          monitored_host: jellybase

  - job_name: alloy
    static_configs:
      - targets:
          - host.docker.internal:12345
        labels:
          monitored_host: jellybase
      - targets:
          - jellyhome:12345
        labels:
          monitored_host: jellyhome
      - targets:
          - jellyberry:12345
        labels:
          monitored_host: jellyberry

  - job_name: mqtt_exporter
    static_configs:
      - targets:
          - mqtt-exporter:9000
        labels:
          monitored_host: jellyoffice
          mqtt_source: jellyoffice
