# inventory/services.yml

services:

  homepage:
    display_name: Homepage
    icon: homepage.png
    category: Core
    mode: active-active
    hosts:
      - jellyhome
      - jellybase
    containers:
      jellyhome:
        - homepage
      jellybase:
        - homepage
    urls:
      primary: http://192.168.1.1
      secondary: http://192.168.1.2
      jellyhome_lan: http://192.168.1.1
      jellybase_lan: http://192.168.1.2
      jellyhome_tailscale: http://100.90.175.59
      jellybase_tailscale: http://100.125.86.118
      jellyhome_magicdns: http://jellyhome.cheetah-iwato.ts.net
      jellybase_magicdns: http://jellybase.cheetah-iwato.ts.net
    backup: config-only
    status: active

  dozzle:
    display_name: Dozzle
    icon: dozzle.png
    category: Core
    mode: central-ui-plus-agents
    hosts:
      ui:
        - jellyhome
      agents:
        - jellybase
        - jellyberry
    containers:
      jellyhome:
        - dozzle
      jellybase:
        - dozzle-agent
      jellyberry:
        - dozzle-agent
    urls:
      primary: http://192.168.1.1:8080
    backup: config-only
    status: active

  portainer:
    display_name: Portainer
    icon: portainer.png
    category: Core
    mode: central-ui-plus-agents
    hosts:
      server:
        - jellyhome
      agents:
        - jellybase
    containers:
      jellyhome:
        - portainer
      jellybase:
        - portainer-agent
    urls:
      primary: https://192.168.1.1:9443
    backup: appdata
    status: active

  network-map:
    display_name: Network Map
    icon: mdi-lan
    category: Core
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - network-map
    urls:
      primary: http://192.168.1.2:8788
      jellybase_lan: http://192.168.1.2:8788
      jellybase_tailscale: http://100.125.86.118:8788
    description: Live network dashboard | topology, host health, backup status, alerts | Prometheus/Alertmanager integration
    backup: config-only
    status: active

  portfolio-mission-control-v2:
    display_name: Portfolio Mission Control
    icon: mdi-view-dashboard-outline
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - portfolio-mission-control-v2
    urls:
      primary: http://192.168.1.159:8787
    description: portfolio dashboard | home-network managed on jellyberry
    source:
      type: git
      local_path: /home/jellybot/portfolio-intel
      remote: git@github.com:dotalbot/portfolio-intel.git
      build_context: /home/jellybot/portfolio-intel
      dockerfile: Dockerfile
      restore_note: Requires the source repository plus `/opt/docker/appdata/portfolio-mission-control-v2/data` and `/home/jellybot/.hermes/.env` on the host.
    backup: appdata-and-source-repo
    status: active

  sc401-study-hub:
    display_name: SC-401 Study Hub
    icon: mdi-school-outline
    category: Study
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - sc401-study-hub
    urls:
      primary: http://192.168.1.159:8791
    description: certification study hub | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/sc-100-prep/study-web
      remote: TBD
      build_context: /home/jellybot/sc-100-prep/study-web
      dockerfile: Dockerfile
      restore_note: Requires the study-web source directory; no git remote is currently recorded in this repo.
    backup: source-repo
    status: active

  ms102-study-hub:
    display_name: MS-102 Study Hub
    icon: mdi-school-outline
    category: Study
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - ms102-study-hub
    urls:
      primary: http://192.168.1.159:8794
    description: Microsoft 365 Administrator study hub | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/ms-102-prep/study-web
      remote: TBD
      build_context: /home/jellybot/ms-102-prep/study-web
      dockerfile: Dockerfile
      restore_note: Requires the MS-102 study-web source directory; no git remote is currently recorded in this repo.
    backup: source-repo
    status: active

  cert-study-hub:
    display_name: Certification Study Hub
    icon: mdi-school-outline
    category: Study
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - cert-study-hub
    urls:
      primary: http://192.168.1.159:8795
    description: Unified certification study menu for SC-401, MS-102, and AB-900 | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/cert-study-hub
      remote: TBD
      build_context: /home/jellybot/cert-study-hub
      dockerfile: Dockerfile
      restore_note: Requires `/home/jellybot/cert-study-hub`, generated from the local SC-401, MS-102, and AB-900 downloaded course directories.
    backup: source-repo
    status: active

  image-pastebin:
    display_name: Image Pastebin
    icon: mdi-image-plus-outline
    category: Tools
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - image-pastebin
    urls:
      primary: http://192.168.1.159:8792
    description: unauthenticated LAN upload helper | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/image-pastebin
      remote: TBD
      build_context: /home/jellybot/image-pastebin
      dockerfile: Dockerfile
      restore_note: Requires the image-pastebin source directory; uploads live under `/opt/docker/appdata/image-pastebin/uploads` if retention is needed.
    backup: uploads-if-needed
    status: active

  jellyfood-web:
    display_name: Jellyfood
    icon: mdi-food-apple-outline
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellybase
    containers:
      jellybase:
        - jellyfood-web
        - jellyfood-api
    urls:
      primary: http://192.168.1.2:8793
      local: http://127.0.0.1:8793
      api: http://192.168.1.2:8794
    description: mobile-first food diary web app | static Expo export served by nginx + REST API
    source:
      type: git
      local_path: /home/jellylady/repo/jellyfood
      remote: git@github.com:dotalbot/jellyfood.git
      build_context: /home/jellylady/repo/jellyfood
      dockerfile: Dockerfile
      restore_note: Requires the Jellyfood source repository at the recorded build context; app diary data is browser/device-local and is not stored on the server.
    backup: source-repo
    status: active

  jellyfood-api:
    display_name: Jellyfood API
    icon: mdi-food-apple-outline
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellybase
    containers:
      jellybase:
        - jellyfood-api
    urls:
      primary: http://192.168.1.2:8794/api/health
      api: http://192.168.1.2:8794
      local: http://127.0.0.1:8794
    description: REST API backend for Jellyfood | Node.js + better-sqlite3
    source:
      type: git
      local_path: /home/jellylady/repo/jellyfood
      remote: git@github.com:dotalbot/jellyfood.git
      build_context: /home/jellylady/repo/jellyfood
      dockerfile: packages/api/Dockerfile
      restore_note: Requires the Jellyfood source repository; API data stored in SQLite at /data/foods.db mapped to /opt/docker/appdata/jellyfood-api.
    backup: sqlite-data
    status: active

  netdata:
    display_name: Netdata
    category: Retired
    mode: retired
    description: retired legacy host diagnostics; containers/appdata have been removed from managed hosts after replacement by Prometheus/node_exporter/Loki/Alloy
    backup: config-and-cache
    status: retired-cleaned


  prometheus:
    display_name: Prometheus
    icon: prometheus.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - prometheus
    urls:
      primary: http://192.168.1.2:9090
    backup: appdata
    status: active

  alertmanager:
    display_name: Alertmanager
    icon: prometheus.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - alertmanager
        - alertmanager-discord-bridge
    urls:
      primary: http://192.168.1.2:9093
      bridge_health_internal: http://alertmanager-discord-bridge:9094/healthz
    description: Prometheus alert grouping, dedupe, silences, and Discord wake-up delivery bridge
    backup: config-only
    status: active

  grafana:
    display_name: Grafana
    icon: grafana.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - grafana
    urls:
      primary: http://192.168.1.2:3001
    backup: appdata
    status: active

  loki:
    display_name: Loki
    icon: grafana.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - loki
    urls:
      primary: http://192.168.1.2:3001/d/explore/explore?left=%7B%22datasource%22:%22Loki%22%7D
      api: http://192.168.1.2:3100
      health: http://192.168.1.2:3100/ready
    description: log history layer for Grafana; receives Borgmatic, host journal, and Docker container logs
    backup: appdata
    status: active

  mqtt-exporter:
    display_name: MQTT Exporter
    icon: mdi-chart-line
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - mqtt-exporter
    urls:
      primary: http://192.168.1.2:9090/graph?g0.expr=mqtt_temperature%7Bmonitored_host%3D%22jellyoffice%22%7D&g0.tab=0
      metrics: http://192.168.1.2:9000/metrics
    description: Bridges retained jellyoffice MQTT JSON telemetry into Prometheus metrics on jellybase
    backup: config-only
    status: active
    notes:
      - Uses dedicated Mosquitto user mqtt-exporter with read-only ACL for home/sensors/jellyoffice/#.
      - Secret lives at /opt/docker/.secrets/mqtt-exporter/password on jellybase.
      - Subscribes to home/sensors/jellyoffice/json; individual scalar topics remain for HA/operator visibility.

  alloy:
    display_name: Alloy
    icon: grafana.png
    category: Monitoring
    mode: per-host-agent
    hosts:
      - jellybase
      - jellyhome
      - jellyberry
    containers:
      jellybase:
        - alloy
      jellyhome:
        - alloy
      jellyberry:
        - alloy
    urls:
      primary: http://192.168.1.2:3001/d/explore/explore?left=%7B%22datasource%22:%22Loki%22%7D
      metrics_jellyhome: http://192.168.1.1:12345/metrics
      metrics_jellybase: http://192.168.1.2:12345/metrics
      metrics_jellyberry: http://192.168.1.159:12345/metrics
    description: per-host Loki log shipper for selected systemd journal and Docker container logs
    backup: config-only
    status: active

  central-postgres:
    display_name: Central PostgreSQL
    icon: postgres.png
    category: Data
    homepage: false
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - central-postgres
    urls:
      primary: postgresql://192.168.1.2:5432
    description: shared PostgreSQL platform service for home-network applications; first target is Manyfold
    network_access:
      bind_host: 192.168.1.2
      port: 5432
      protocol: tcp
      policy: allowlist
      allowed_sources:
        - host: jellybase
          lan_ip: 192.168.1.2
          reason: local admin, backup, and bootstrap jobs
        - host: jellyhome
          lan_ip: 192.168.1.1
          reason: Manyfold application host
      denied_by_default: true
      docker_publish_warning: use pg_hba plus Docker-aware host firewall or equivalent network policy; LAN bind alone is not a source allowlist
    notes:
      - PostgreSQL binds to 192.168.1.2:5432 and is reachable from jellybase and jellyhome.
      - TCP-level filtering is enforced through source-managed DOCKER-USER rules matching the central-postgres container IP; re-apply after container recreation.
      - Backup uses Borg coverage plus logical dumps from day one.
      - First application database is manyfold with user svc_manyfold.
    backup: postgres-volume-and-logical-dumps
    status: active

  homeassistant:
    display_name: Home Assistant
    icon: home-assistant.png
    category: IoT
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - homeassistant
    urls:
      primary: http://192.168.1.2:8123
    description: smart home controller | jellybase host-network container
    backup: appdata
    status: active

  manyfold:
    display_name: Manyfold
    icon: mdi-printer-3d
    category: Media
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - manyfold
        - manyfold-valkey
    urls:
      primary: http://192.168.1.1:3214/health
      app: http://192.168.1.1:3214
      health: http://192.168.1.1:3214/health
    description: 3D model library manager on jellyhome using central PostgreSQL on jellybase via FILE__DATABASE_URL; library mount is read-write because Manyfold validates local libraries as writable
    database:
      host: jellybase
      endpoint: postgresql://192.168.1.2:5432/manyfold
      database: manyfold
      user: svc_manyfold
      password_secret: /opt/docker/.secrets/postgres_manyfold_password
      url_secret: /opt/docker/.secrets/manyfold_database_url
    libraries:
      models:
        host_path: /home/jellyfish/media/Primary_5TB/3D_models
        container_path: /libraries/3D_models
        initial_mode: read-write
        verified_counts: 124 models / 1683 model files after central PostgreSQL scan
    backup: manyfold-appdata-central-postgres-and-library
    status: active

  3dprint-loader:
    display_name: 3D Print Loader
    icon: mdi-cube-scan
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - 3dprint-loader-api
        - 3dprint-loader-web
    urls:
      primary: http://192.168.1.1:8793
      health: http://192.168.1.1:8793/health
    description: Cross-repo 3D model source resolver and previewer for MakerWorld, Printables, Thingiverse, and future Manyfold import; developed on jellyberry, runtime on jellyhome via home-network.
    source:
      type: git
      local_path: /home/jellybot/3dprint_loader
      remote: git@github.com:dotalbot/3dprint_loader.git
      branch: feat/initial-mvp-scaffold
      build_context: /home/jellybot/3dprint_loader
      dockerfile: backend/Dockerfile and frontend/Dockerfile
      build_contexts:
        api: /home/jellybot/3dprint_loader/backend
        web: /home/jellybot/3dprint_loader/frontend
      restore_note: Requires source checkout on jellyhome plus /opt/docker appdata/secrets; refresh with git fetch and git pull --ff-only before compose rebuild.
    appdata:
      storage: /opt/docker/appdata/3dprint-loader/storage
      secrets: /opt/docker/.secrets/3dprint-loader
      makerworld_storage_state: /opt/docker/.secrets/3dprint-loader/makerworld-storage-state.json
    integrations:
      manyfold_base_url: http://manyfold:3214
    backup: appdata-and-source-repo
    status: active


  hindsight:
    display_name: Hindsight
    icon: mdi-brain
    category: Tools
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - hindsight
    urls:
      primary: http://192.168.1.1:9999
      api: http://192.168.1.1:18888
      tailscale_ui: http://100.90.175.59:9999
      tailscale_api: http://100.90.175.59:18888
    description: central Hindsight memory service for Hermes/OpenCode experiments; API on 18888, UI on 9999, bound to jellyhome LAN and Tailnet addresses only
    appdata:
      data: /opt/docker/appdata/hindsight/data
      secrets: /opt/docker/.secrets/hindsight/hindsight.env
    integrations:
      hermes_api_url: http://jellyhome:18888
      opencode_plugin: "@vectorize-io/opencode-hindsight"
      recommended_banks:
        - global-dominic
        - logk-main
        - jellyweb-main
        - home-network-main
        - hermes-main
        - opencode-main
    backup: appdata
    status: active

  crawl4ai:
    display_name: Crawl4AI
    icon: mdi-spider-web
    category: Tools
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - crawl4ai
    urls:
      primary: http://192.168.1.2:11235/playground
      api: http://192.168.1.2:11235
      health: http://192.168.1.2:11235/health
      metrics: http://192.168.1.2:11235/metrics
    description: local open-source web crawler and markdown extraction API for Hermes/project workflows; LAN-bound on jellybase, not a public scraper endpoint
    appdata:
      config_template: /opt/docker/appdata/crawl4ai/config.example.yml
      runtime_config_secret: /opt/docker/.secrets/crawl4ai/config.yml
      secrets: /opt/docker/.secrets/crawl4ai
    integrations:
      hermes_candidate: true
      firecrawl_fallback_candidate: true
      api_base_url: http://jellybase:11235
    backup: config-only
    status: active
    notes:
      - Docker image pinned to unclecode/crawl4ai:0.8.6.
      - Runtime config is mounted from /opt/docker/.secrets/crawl4ai/config.yml because it contains the API token used to mint JWTs.
      - Initial deployment uses no LLM provider secrets; add them only under /opt/docker/.secrets/crawl4ai if a later workflow needs LLM extraction.
      - Consuming apps must still apply URL allowlists/private-IP blocking before sending crawl requests.

  seedit4me-reverse-tunnel:
    display_name: Seedit4.me Reverse Tunnel
    icon: mdi-tunnel
    category: Remote Access
    mode: systemd-single-primary
    hosts:
      - jellyberry
    systemd_units:
      jellyberry:
        - home-network-seedit4me-reverse-tunnel.service
    urls:
      remote_ssh: ssh://seedit4me@nl13.seedit4.me:2088
      remote_loopback: ssh://127.0.0.1:22022
    description: fallback reverse SSH tunnel for jellyberry when Tailscale is blocked; remote port is loopback-only on seedit4.me
    backup: config-only
    status: active

  calibre-web-automated:
    display_name: Calibre Web Automated
    icon: calibre-web.png
    category: Media
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - calibre-web-automated
    urls:
      primary: pending
    backup: appdata-and-library
    status: planned

  mosquitto:
    display_name: Mosquitto MQTT
    icon: mdi-lan-connect
    category: IoT
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - mqtt-mosquitto
    urls:
      primary: mqtt://192.168.1.1:1883
      homepage: http://192.168.1.2:8788
      websocket: ws://192.168.1.1:9001
    description: MQTT broker | jellyhome
    backup: config-and-persistence
    status: active

  jellyoffice-enviro:
    display_name: Jellyoffice Enviro
    icon: mdi-thermometer-water
    category: IoT
    mode: mqtt-publisher
    hosts:
      - jellyoffice
    systemd_units:
      jellyoffice:
        - enviro-publisher.service
    urls:
      primary: http://192.168.1.2:9090/graph?g0.expr=mqtt_temperature%7Bmonitored_host%3D%22jellyoffice%22%7D&g0.tab=0
      prometheus_query: http://192.168.1.2:9090/graph?g0.expr=mqtt_temperature%7Bmonitored_host%3D%22jellyoffice%22%7D&g0.tab=0
      network_map: http://192.168.1.2:8788
      mqtt_topic: mqtt://192.168.1.1:1883/home/sensors/jellyoffice
      home_assistant_discovery: mqtt://192.168.1.1:1883/homeassistant/sensor/jellyoffice
      tailscale_ssh: ssh://jellyfish@100.120.3.77
    description: >
      Native Python/systemd publisher on Raspberry Pi Zero 2 W with Pimoroni Enviro.
      Publishes temperature, humidity, pressure, lux, proximity, and lightweight host
      health metrics via MQTT to Mosquitto on jellyhome. Strictly non-Docker.
    backup: config-only
    status: active
    notes:
      - Runtime state is /opt/jellyoffice on jellyoffice; no /opt/docker.
      - MQTT credentials are host-local in /opt/jellyoffice/config.json and not stored in Git.
      - No Borg backup runs on jellyoffice; rebuild from this repo plus host-local MQTT credential recreation.
      - Home Assistant discovery topics are retained under homeassistant/sensor/jellyoffice/#.
      - ADS1015 is detected at 0x23, but noise channel reads currently return I/O errors; noise is not published yet.

  webtop-jellybase:
    display_name: Webtop jellybase
    icon: mdi-monitor-dashboard
    category: Tools
    mode: host-local-desktop
    hosts:
      - jellybase
    containers:
      jellybase:
        - webtop-jellybase
    urls:
      primary: https://192.168.1.2:30301
      lan: https://192.168.1.2:30301
      tailscale: https://100.125.86.118:30301
    description: Browser-accessible LinuxServer Webtop desktop on jellybase | LAN/Tailscale only | basic auth | hardened desktop profile
    backup: appdata
    status: active
    notes:
      - Persistent config lives at /opt/docker/appdata/webtop-jellybase/config.
      - Password secret lives at /opt/docker/.secrets/webtop-jellybase/password and is not stored in Git.
      - Initial deployment uses HARDEN_DESKTOP=true, START_DOCKER=false, no Docker socket, no privileged mode, and no GPU passthrough.

  webtop-jellyhome:
    display_name: Webtop jellyhome
    icon: mdi-monitor-dashboard
    category: Tools
    mode: host-local-desktop
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - webtop-jellyhome
    urls:
      primary: https://192.168.1.1:30301
      lan: https://192.168.1.1:30301
      tailscale: https://100.90.175.59:30301
    description: Browser-accessible LinuxServer Webtop desktop on jellyhome | LAN/Tailscale only | basic auth | hardened desktop profile
    backup: appdata
    status: active
    notes:
      - Persistent config lives at /opt/docker/appdata/webtop-jellyhome/config.
      - Password secret lives at /opt/docker/.secrets/webtop-jellyhome/password and is not stored in Git.
      - Initial deployment uses HARDEN_DESKTOP=true, START_DOCKER=false, no Docker socket, no privileged mode, and no GPU passthrough.

drift:
  ignored_containers:
    jellybase:
      - onecli-postgres-1
      - onecli
    jellyhome:
      # Existing out-of-band workloads observed during May 2026 recon. Keep
      # these ignored until they are adopted into home-network or retired.
      - borg-redis
      - borg-web-ui
      - dozzle-agent
      - nanoclaw-v2-llama-with-sarah-1777924263965
      - onecli
      - onecli-postgres-1
      - osrm_routing_engine-osrm-1
