# inventory/services.yml

services:

  homepage:
    display_name: Homepage
    icon: homepage.png
    category: Core
    mode: active-active
    hosts:
      - jellyhome
      - jellybase
    containers:
      jellyhome:
        - homepage
      jellybase:
        - homepage
    urls:
      primary: http://192.168.1.1
      secondary: http://192.168.1.2
      jellyhome_lan: http://192.168.1.1
      jellybase_lan: http://192.168.1.2
      jellyhome_tailscale: http://100.90.175.59
      jellybase_tailscale: http://100.125.86.118
      jellyhome_magicdns: http://jellyhome.cheetah-iwato.ts.net
      jellybase_magicdns: http://jellybase.cheetah-iwato.ts.net
    backup: config-only
    status: active

  dozzle:
    display_name: Dozzle
    icon: dozzle.png
    category: Core
    mode: central-ui-plus-agents
    hosts:
      ui:
        - jellyhome
      agents:
        - jellybase
        - jellyberry
    containers:
      jellyhome:
        - dozzle
      jellybase:
        - dozzle-agent
      jellyberry:
        - dozzle-agent
    urls:
      primary: http://192.168.1.1:8080
    backup: config-only
    status: active

  portainer:
    display_name: Portainer
    icon: portainer.png
    category: Core
    mode: central-ui-plus-agents
    hosts:
      server:
        - jellyhome
      agents:
        - jellybase
    containers:
      jellyhome:
        - portainer
      jellybase:
        - portainer-agent
    urls:
      primary: https://192.168.1.1:9443
    backup: appdata
    status: active

  network-map:
    display_name: Network Map
    icon: mdi-lan
    category: Core
    mode: single-primary
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - network-map
    urls:
      primary: http://192.168.1.159:8788
    description: interactive inventory | LAN and Tailscale discovery
    backup: config-only
    status: active

  portfolio-mission-control-v2:
    display_name: Portfolio Mission Control
    icon: mdi-view-dashboard-outline
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - portfolio-mission-control-v2
    urls:
      primary: http://192.168.1.159:8787
    description: portfolio dashboard | home-network managed on jellyberry
    source:
      type: git
      local_path: /home/jellybot/portfolio-intel
      remote: git@github.com:dotalbot/portfolio-intel.git
      build_context: /home/jellybot/portfolio-intel
      dockerfile: Dockerfile
      restore_note: Requires the source repository plus `/opt/docker/appdata/portfolio-mission-control-v2/data` and `/home/jellybot/.hermes/.env` on the host.
    backup: appdata-and-source-repo
    status: active

  sc401-study-hub:
    display_name: SC-401 Study Hub
    icon: mdi-school-outline
    category: Study
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - sc401-study-hub
    urls:
      primary: http://192.168.1.159:8791
    description: certification study hub | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/sc-100-prep/study-web
      remote: TBD
      build_context: /home/jellybot/sc-100-prep/study-web
      dockerfile: Dockerfile
      restore_note: Requires the study-web source directory; no git remote is currently recorded in this repo.
    backup: source-repo
    status: active

  image-pastebin:
    display_name: Image Pastebin
    icon: mdi-image-plus-outline
    category: Tools
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - image-pastebin
    urls:
      primary: http://192.168.1.159:8792
    description: unauthenticated LAN upload helper | home-network managed on jellyberry
    source:
      type: local-directory
      local_path: /home/jellybot/image-pastebin
      remote: TBD
      build_context: /home/jellybot/image-pastebin
      dockerfile: Dockerfile
      restore_note: Requires the image-pastebin source directory; uploads live under `/opt/docker/appdata/image-pastebin/uploads` if retention is needed.
    backup: uploads-if-needed
    status: active

  netdata:
    display_name: Netdata
    category: Retired
    mode: retired
    description: retired legacy host diagnostics; containers/appdata remain until manual cleanup
    backup: config-and-cache
    status: retired


  prometheus:
    display_name: Prometheus
    icon: prometheus.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - prometheus
    urls:
      primary: http://192.168.1.2:9090
    backup: appdata
    status: active

  grafana:
    display_name: Grafana
    icon: grafana.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - grafana
    urls:
      primary: http://192.168.1.2:3001
    backup: appdata
    status: active

  loki:
    display_name: Loki
    icon: grafana.png
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - loki
    urls:
      primary: http://192.168.1.2:3100
    description: log history layer for Grafana; Borgmatic log shipping is follow-up
    backup: appdata
    status: active

  central-postgres:
    display_name: Central PostgreSQL
    icon: postgres.png
    category: Data
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - central-postgres
    urls:
      primary: postgresql://192.168.1.2:5432
    description: shared PostgreSQL platform service for home-network applications; first target is Manyfold
    network_access:
      bind_host: 192.168.1.2
      port: 5432
      protocol: tcp
      policy: allowlist
      allowed_sources:
        - host: jellybase
          lan_ip: 192.168.1.2
          reason: local admin, backup, and bootstrap jobs
        - host: jellyhome
          lan_ip: 192.168.1.1
          reason: Manyfold application host
      denied_by_default: true
      docker_publish_warning: use pg_hba plus Docker-aware host firewall or equivalent network policy; LAN bind alone is not a source allowlist
    notes:
      - PostgreSQL binds to 192.168.1.2:5432 and is reachable from jellybase and jellyhome.
      - TCP-level filtering is enforced through source-managed DOCKER-USER rules matching the central-postgres container IP; re-apply after container recreation.
      - Backup uses Borg coverage plus logical dumps from day one.
      - First application database is manyfold with user svc_manyfold.
    backup: postgres-volume-and-logical-dumps
    status: active

  homeassistant:
    display_name: Home Assistant
    icon: home-assistant.png
    category: IoT
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - homeassistant
    urls:
      primary: http://192.168.1.2:8123
    description: smart home controller | jellybase host-network container
    backup: appdata
    status: active

  manyfold:
    display_name: Manyfold
    icon: mdi-printer-3d
    category: Media
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - manyfold
        - manyfold-valkey
    urls:
      primary: http://192.168.1.1:3214
    description: 3D model library manager on jellyhome using central PostgreSQL on jellybase
    database:
      host: jellybase
      endpoint: postgresql://192.168.1.2:5432/manyfold
      database: manyfold
      user: svc_manyfold
      password_secret: /opt/docker/.secrets/postgres_manyfold_password
    libraries:
      models:
        host_path: /home/jellyfish/media/Primary_5TB/3D_models
        container_path: /libraries/3D_models
        initial_mode: read-only
    backup: manyfold-appdata-central-postgres-and-library
    status: active

  calibre-web-automated:
    display_name: Calibre Web Automated
    icon: calibre-web.png
    category: Media
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - calibre-web-automated
    urls:
      primary: pending
    backup: appdata-and-library
    status: planned

  mosquitto:
    display_name: Mosquitto MQTT
    icon: eclipse-mosquitto.png
    category: IoT
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - mqtt-mosquitto
    urls:
      primary: mqtt://192.168.1.1:1883
      websocket: ws://192.168.1.1:9001
    description: MQTT broker | jellyhome
    backup: config-and-persistence
    status: active

drift:
  ignored_containers:
    jellyhome:
      - netdata
    jellybase:
      - onecli-postgres-1
      - onecli
      - netdata
