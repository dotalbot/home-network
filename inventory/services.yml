# inventory/services.yml

services:

  homepage:
    display_name: Homepage
    category: Core
    mode: active-active
    hosts:
      - jellyhome
      - jellybase
    containers:
      jellyhome:
        - homepage
      jellybase:
        - homepage
    urls:
      primary: http://jellyhome
      secondary: http://jellybase
      jellyhome_lan: http://192.168.1.1
      jellybase_lan: http://192.168.1.2
      jellyhome_tailscale: http://100.90.175.59
      jellybase_tailscale: http://100.125.86.118
      jellyhome_magicdns: http://jellyhome.cheetah-iwato.ts.net
      jellybase_magicdns: http://jellybase.cheetah-iwato.ts.net
    backup: config-only
    status: active

  dozzle:
    display_name: Dozzle
    category: Core
    mode: central-ui-plus-agents
    hosts:
      ui:
        - jellyhome
      agents:
        - jellybase
    containers:
      jellyhome:
        - dozzle
      jellybase:
        - dozzle-agent
    urls:
      primary: http://jellyhome:8080
    backup: config-only
    status: active

  portainer:
    display_name: Portainer
    category: Core
    mode: central-ui-plus-agents
    hosts:
      server:
        - jellyhome
      agents:
        - jellybase
    containers:
      jellyhome:
        - portainer
      jellybase:
        - portainer-agent
    urls:
      primary: https://jellyhome:9443
    backup: appdata
    status: active

  network-map:
    display_name: Network Map
    category: Core
    mode: single-primary
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - network-map
    urls:
      primary: http://jellyberry:8788
    description: interactive inventory | LAN and Tailscale discovery
    backup: config-only
    status: active

  portfolio-mission-control-v2:
    display_name: Portfolio Mission Control
    category: Projects
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - portfolio-mission-control-v2
    urls:
      primary: http://jellyberry:8787
    description: portfolio dashboard | home-network managed on jellyberry
    backup: appdata-and-source-repo
    status: active

  sc401-study-hub:
    display_name: SC-401 Study Hub
    category: Study
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - sc401-study-hub
    urls:
      primary: http://jellyberry:8791
    description: certification study hub | home-network managed on jellyberry
    backup: source-repo
    status: active

  image-pastebin:
    display_name: Image Pastebin
    category: Tools
    mode: single-primary-home-network-compose
    hosts:
      - jellyberry
    containers:
      jellyberry:
        - image-pastebin
    urls:
      primary: http://jellyberry:8792
    description: unauthenticated LAN upload helper | home-network managed on jellyberry
    backup: uploads-if-needed
    status: active

  netdata:
    display_name: Netdata
    category: Monitoring
    mode: duplicated-parents
    hosts:
      - jellyhome
      - jellybase
    containers:
      jellyhome:
        - netdata
      jellybase:
        - netdata
    urls:
      jellyhome: http://jellyhome:19999
      jellybase: http://jellybase:19999
    backup: config-and-cache
    status: active

  prometheus:
    display_name: Prometheus
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - prometheus
    urls:
      primary: http://jellybase:9090
    backup: appdata
    status: active

  grafana:
    display_name: Grafana
    category: Monitoring
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - grafana
    urls:
      primary: http://jellybase:3001
    backup: appdata
    status: active

  homeassistant:
    display_name: Home Assistant
    category: IoT
    mode: single-primary
    hosts:
      - jellybase
    containers:
      jellybase:
        - homeassistant
    urls:
      primary: pending
    backup: appdata
    status: active

  calibre-web-automated:
    display_name: Calibre Web Automated
    category: Media
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - calibre-web-automated
    urls:
      primary: pending
    backup: appdata-and-library
    status: planned

  mosquitto:
    display_name: Mosquitto MQTT
    category: IoT
    mode: single-primary
    hosts:
      - jellyhome
    containers:
      jellyhome:
        - mqtt-mosquitto
    urls:
      primary: mqtt://jellyhome:1883
      websocket: ws://jellyhome:9001
    description: MQTT broker | jellyhome
    backup: config-and-persistence
    status: active

drift:
  ignored_containers:
    jellyhome: []
    jellybase:
      - homeassistant
      - onecli-postgres-1
      - onecli
