# inventory/hosts.yml

hosts:
  jellyhome:
    description: Main Ubuntu Docker/dev server
    roles:
      - docker-host
      - homepage-primary
      - dozzle-ui
      - portainer-server
      - calibre
      - mqtt
      - netdata-parent
      - dev-server
      - borg-client
      - tailscale-node

  jellybase:
    description: Secondary Ubuntu Docker/monitoring server
    roles:
      - docker-host
      - homepage-secondary
      - prometheus
      - dozzle-agent
      - portainer-agent
      - netdata-parent
      - dev-sync-mirror
      - borg-client
      - tailscale-node

  jellyberry:
    description: Raspberry Pi Docker host, current home of Hermes agent and lightweight local services
    roles:
      - pi
      - docker-host
      - network-map
      - lightweight-services
      - dozzle-agent
      - netdata-child
      - borg-client
      - tailscale-node
  
  jellybackup:
    description: Host dedicated to Borg backup, as the backupserver
    lan_ip: 192.168.1.75
    roles:
      - pi
      - netdata-child
      - borg-server
      - tailscale-node
    notes:
      - Primary Borg/Borgmatic backup target.
      - Use LAN IP 192.168.1.75 for backup traffic; FQDN resolves over Tailscale and is too taxing on the Pi backup host.

  seedbox:
    description: Remote seedbox / remote sync / backup helper
    roles:
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-exit-node
      - borg-target
