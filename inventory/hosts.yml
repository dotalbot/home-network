# inventory/hosts.yml

monitoring_defaults:
  node_exporter:
    enabled: false
    scrape_port: 9100
    scrape_scheme: http
    textfile_collector_dir: /var/lib/node_exporter/textfile_collector
    disk_health: best-effort
    disk_devices:
      - auto
    pi_early_warning: false
    allowed_scrapers:
      - host: jellybase
        role: prometheus

hosts:
  jellyhome:
    description: Main Ubuntu Docker/dev server
    lan_ip: 192.168.1.1
    roles:
      - docker-host
      - homepage-primary
      - dozzle-ui
      - portainer-server
      - calibre
      - mqtt
      - dev-server
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyhome

  jellybase:
    description: Secondary Ubuntu Docker/monitoring server
    lan_ip: 192.168.1.2
    roles:
      - docker-host
      - homepage-secondary
      - prometheus
      - database-host
      - postgres-primary
      - dozzle-agent
      - portainer-agent
      - dev-sync-mirror
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellybase

  jellyberry:
    description: Raspberry Pi Docker host, current home of Hermes agent and lightweight local services
    lan_ip: 192.168.1.159
    roles:
      - pi
      - docker-host
      - network-map
      - lightweight-services
      - dozzle-agent
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyberry
        pi_early_warning: true
  
  jellybackup:
    description: Host dedicated to Borg backup, as the backupserver
    lan_ip: 192.168.1.75
    roles:
      - pi
      - borg-server
      - tailscale-node
    notes:
      - Primary Borg/Borgmatic backup target.
      - Use LAN IP 192.168.1.75 for backup traffic; FQDN resolves over Tailscale and is too taxing on the Pi backup host.

  jellyoffice:
    description: Raspberry Pi Zero 2 W environmental sensor node with Pimoroni Enviro
    lan_ip: TBD
    tailscale_ip: 100.120.3.77
    roles:
      - pi
      - iot-sensor
      - mqtt-publisher
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: false
        note: >
          Too resource-intensive for a 512MB Pi Zero 2 W. Health metrics
          publish via MQTT under home/sensors/jellyoffice/# and can be
          bridged to Prometheus from jellybase.
    notes:
      - Strictly non-Docker host; do not create /opt/docker or dockerops.
      - Host-local state lives under /opt/jellyoffice only.
      - 32-bit Raspberry Pi OS Lite armhf.
      - I2C verified: 0x23 ADS1015, 0x76 BME280.
      - Tailscale SSH enabled.

  seedbox:
    description: Remote seedbox / remote sync / backup helper
    roles:
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-exit-node
      - borg-target
