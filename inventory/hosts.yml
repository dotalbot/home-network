# inventory/hosts.yml

monitoring_defaults:
  node_exporter:
    enabled: false
    scrape_port: 9100
    scrape_scheme: http
    textfile_collector_dir: /var/lib/node_exporter/textfile_collector
    disk_health: best-effort
    disk_devices:
      - auto
    pi_early_warning: false
    allowed_scrapers:
      - host: jellybase
        role: prometheus

hosts:
  jellyhome:
    description: Main Ubuntu Docker/dev server
    lan_ip: 192.168.1.1
    roles:
      - docker-host
      - homepage-primary
      - dozzle-ui
      - portainer-server
      - calibre
      - mqtt
      - dev-server
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyhome
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Initial read-only maintenance visibility; no automatic mutation.

  jellybase:
    description: Secondary Ubuntu Docker/monitoring server
    lan_ip: 192.168.1.2
    tailscale_ip: 100.125.86.118
    roles:
      - docker-host
      - homepage-secondary
      - prometheus
      - database-host
      - postgres-primary
      - dozzle-agent
      - portainer-agent
      - dev-sync-mirror
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellybase
    maintenance:
      enabled: true
      mode: manual_approval
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: manual_approval
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services:
          - homeassistant
          - open-webui
          - central-postgres
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Root filesystem has fired FilesystemSpaceLow; stage cleanup through manual approval first.

  jellyberry:
    description: Raspberry Pi Docker host, current home of Hermes agent and lightweight local services
    lan_ip: 192.168.1.159
    roles:
      - pi
      - docker-host
      - network-map
      - lightweight-services
      - dozzle-agent
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyberry
        pi_early_warning: true
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Hermes/lightweight services host; keep maintenance read-only until policy is proven.
  
  jellybackup:
    description: Host dedicated to Borg backup, as the backupserver
    lan_ip: 192.168.1.75
    tailscale_ip: 100.116.9.17
    roles:
      - pi
      - borg-server
      - tailscale-node
      - node-exporter-client
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: 192.168.1.75
        pi_early_warning: true
        note: >
          Enabled after root filesystem cleanup. Scrape over LAN so backup
          traffic and monitoring avoid MagicDNS/Tailscale overhead on the Pi.
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: false
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 2
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Backup target; never clean backup data or volumes automatically.
    notes:
      - Primary Borg/Borgmatic backup target.
      - Use LAN IP 192.168.1.75 for backup traffic; FQDN resolves over Tailscale and is too taxing on the Pi backup host.
      - External disk mounted at /home/jellybackup/externaldisk.
      - Hidden underlay data at /home/jellybackup/externaldisk/borg_store was recovered and removed from the root filesystem underlay.

  jellysa:
    description: South Africa Raspberry Pi Tailscale backup/sync node and exit-node candidate
    lan_ip: null
    tailscale_ip: 100.120.89.41
    site: south-africa
    network_scope: remote-tailnet
    roles:
      - pi
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-node
      - tailscale-exit-node
      - borg-client
      - node-exporter-client
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: 100.120.89.41
        scrape_interval: 5m
        scrape_timeout: 30s
        access_path: tailscale
        pi_early_warning: true
        note: >
          Remote South Africa host. Scrape over Tailscale at a lower cadence than
          local LAN hosts to reduce cross-region chatter and tolerate WAN jitter.
          Package and operator setup still require sudo password entry.
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: false
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 2
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Remote Tailnet host; report only until remote maintenance workflow is proven.
    notes:
      - Debian 13 trixie aarch64 Raspberry Pi kernel observed during onboarding discovery.
      - Interactive tmux pane 0:5 has jellyfish logged in.
      - "Intended role confirmed: Tailscale host, backup/sync node, and exit-node candidate in South Africa."
      - Treat LAN address 192.168.1.194 as pre-relocation discovery only; production management should use Tailscale.
      - Do not use local-network scrape cadence for this host.

  jellyoffice:
    description: Raspberry Pi Zero 2 W environmental sensor node with Pimoroni Enviro
    lan_ip: 192.168.1.71
    tailscale_ip: 100.120.3.77
    roles:
      - pi
      - iot-sensor
      - mqtt-publisher
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: false
        note: >
          Too resource-intensive for a 512MB Pi Zero 2 W. Health metrics
          publish via MQTT under home/sensors/jellyoffice/# and can be
          bridged to Prometheus from jellybase.
    notes:
      - Strictly non-Docker host; do not create /opt/docker or dockerops.
      - Host-local state lives under /opt/jellyoffice only.
      - 32-bit Raspberry Pi OS Lite armhf.
      - I2C verified: 0x23 ADS1015, 0x76 BME280.
      - Tailscale SSH enabled.

  seedbox:
    description: Remote seedbox / remote sync / backup helper
    roles:
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-exit-node
      - borg-target
