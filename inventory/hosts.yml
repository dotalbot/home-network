# inventory/hosts.yml

monitoring_defaults:
  node_exporter:
    enabled: false
    scrape_port: 9100
    scrape_scheme: http
    textfile_collector_dir: /var/lib/node_exporter/textfile_collector
    disk_health: best-effort
    disk_devices:
      - auto
    pi_early_warning: false
    allowed_scrapers:
      - host: jellybase
        role: prometheus

hosts:
  jellyhome:
    description: Main Ubuntu Docker/dev server
    lan_ip: 192.168.1.1
    roles:
      - docker-host
      - homepage-primary
      - dozzle-ui
      - portainer-server
      - calibre
      - mqtt
      - dev-server
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyhome
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Initial read-only maintenance visibility; no automatic mutation.

  jellybase:
    description: Secondary Ubuntu Docker/monitoring server
    lan_ip: 192.168.1.2
    tailscale_ip: 100.125.86.118
    roles:
      - docker-host
      - homepage-secondary
      - prometheus
      - database-host
      - postgres-primary
      - dozzle-agent
      - portainer-agent
      - dev-sync-mirror
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellybase
    maintenance:
      enabled: true
      mode: manual_approval
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: manual_approval
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services:
          - homeassistant
          - open-webui
          - central-postgres
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Root filesystem has fired FilesystemSpaceLow; stage cleanup through manual approval first.

  jellyberry:
    description: Raspberry Pi Docker host, current home of Hermes agent and lightweight local services
    lan_ip: 192.168.1.159
    roles:
      - pi
      - docker-host
      - network-map
      - lightweight-services
      - dozzle-agent
      - borg-client
      - node-exporter-client
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: jellyberry
        pi_early_warning: true
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: true
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 10
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Hermes/lightweight services host; keep maintenance read-only until policy is proven.

  jellydisp:
    description: Raspberry Pi 4 touchscreen display node for local dashboard/kiosk use
    lan_ip: 192.168.1.92
    tailscale_ip: 100.99.15.72
    roles:
      - pi
      - display-node
      - dashboard-kiosk
      - touchscreen
      - edge-mqtt
      - homeassistant-spoke
      - node-exporter-client
      - tailscale-node
    hardware:
      model: Raspberry Pi 4 Model B Rev 1.5
      architecture: arm64
      display:
        type: DSI touchscreen
        output: DSI-1
        resolution: 800x480
        touch_device: generic ft5x06
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: 192.168.1.92
        pi_early_warning: true
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: false
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 2
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Display node; Docker is allowed for the explicit Meross HA-spoke plus edge MQTT workload only.
    notes:
      - Debian 13 trixie arm64 on Raspberry Pi 4 discovered during onboarding.
      - labwc Wayland desktop with DSI-1 800x480 touchscreen and generic ft5x06 touch input.
      - Screen blanking uses swayidle plus wlopm; DSI-1 powers off after 10 minutes idle and resumes on touch/input.
      - Current LAN IP observed as 192.168.1.92; add a router DHCP reservation/DNS alias before relying on mqtt.lan.

  jellybackup:
    description: Host dedicated to Borg backup, as the backupserver
    lan_ip: 192.168.1.75
    tailscale_ip: 100.116.9.17
    roles:
      - pi
      - borg-server
      - tailscale-node
      - node-exporter-client
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: 192.168.1.75
        pi_early_warning: true
        note: >
          Enabled after root filesystem cleanup. Scrape over LAN so backup
          traffic and monitoring avoid MagicDNS/Tailscale overhead on the Pi.
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: false
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 2
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Backup target; never clean backup data or volumes automatically.
    notes:
      - Primary Borg/Borgmatic backup target.
      - Use LAN IP 192.168.1.75 for backup traffic; FQDN resolves over Tailscale and is too taxing on the Pi backup host.
      - External disk mounted at /home/jellybackup/externaldisk.
      - Hidden underlay data at /home/jellybackup/externaldisk/borg_store was recovered and removed from the root filesystem underlay.

  jellysa:
    description: South Africa Raspberry Pi Tailscale backup/sync node and exit-node candidate
    lan_ip: null
    tailscale_ip: 100.120.89.41
    site: south-africa
    network_scope: remote-tailnet
    roles:
      - pi
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-node
      - tailscale-exit-node
      - borg-client
      - node-exporter-client
    monitoring:
      node_exporter:
        enabled: true
        scrape_host: 100.120.89.41
        scrape_interval: 5m
        scrape_timeout: 30s
        access_path: tailscale
        pi_early_warning: true
        note: >
          Remote South Africa host. Scrape over Tailscale at a lower cadence than
          local LAN hosts to reduce cross-region chatter and tolerate WAN jitter.
          Package and operator setup still require sudo password entry.
    maintenance:
      enabled: true
      mode: report_only
      windows:
        preferred: "03:30-05:30"
        timezone: Europe/London
      disk_cleanup:
        mode: report_only
        root_free_warning_pct: 15
        root_free_critical_pct: 8
        allow_build_cache_prune: false
        allow_dangling_image_prune: true
        allow_unused_image_prune: false
        allow_stopped_container_prune: true
        allow_volume_prune: false
        automatic_max_reclaim_gb: 2
      image_updates:
        mode: report_only
        allow_pull: false
        allow_recreate: false
        excluded_services: []
      code_updates:
        mode: report_only
        allow_git_pull: false
        allow_rebuild: false
      notes:
        - Remote Tailnet host; report only until remote maintenance workflow is proven.
    notes:
      - Debian 13 trixie aarch64 Raspberry Pi kernel observed during onboarding discovery.
      - Interactive tmux pane 0:5 has jellyfish logged in.
      - "Intended role confirmed: Tailscale host, backup/sync node, and exit-node candidate in South Africa."
      - Treat LAN address 192.168.1.194 as pre-relocation discovery only; production management should use Tailscale.
      - Do not use local-network scrape cadence for this host.

  homelap:
    description: Windows 11 laptop; heavily used personal device, self-managed backup, low-overhead monitoring only
    lan_ip: 192.168.1.183
    tailscale_ip: 100.122.230.90
    location:
      room: office
      co_located_with:
        - jellyoffice
    roles:
      - windows-laptop
      - tailscale-node
      - windows-exporter-client
    monitoring:
      windows_exporter:
        enabled: true
        scrape_host: 100.122.230.90
        scrape_port: 9182
        scrape_interval: 5m
        scrape_timeout: 15s
        access_path: tailscale
        collector_profile: low-overhead
        enabled_collectors:
          - cpu
          - cs
          - logical_disk
          - memory
          - net
          - os
          - system
        alert_profile: laptop-intermittent
        note: >
          Heavily used laptop; do not use server-style down alerts. Normal sleep,
          roaming, and short offline periods are expected. Alert only on long
          absence or concrete health issues such as low disk space.
    backup:
      mode: self-managed
      note: Existing laptop backup remains outside home-network Borg management.
    notes:
      - windows_exporter 0.30.5 installed on TCP/9182 with low-overhead collectors.
      - Windows Firewall broad MSI rule disabled; narrow allow rule permits jellybase Tailscale 100.125.86.118 only.
      - Observed LAN Wi-Fi IP 192.168.1.183 during onboarding; scrape via Tailscale for stability.

  jellyoffice:
    description: Raspberry Pi Zero 2 W environmental sensor node with Pimoroni Enviro
    lan_ip: 192.168.1.71
    tailscale_ip: 100.120.3.77
    location:
      room: office
      co_located_with:
        - homelap
    roles:
      - pi
      - iot-sensor
      - mqtt-publisher
      - tailscale-node
    monitoring:
      node_exporter:
        enabled: false
        note: >
          Too resource-intensive for a 512MB Pi Zero 2 W. Health metrics
          publish via MQTT under home/sensors/jellyoffice/# and can be
          bridged to Prometheus from jellybase.
    notes:
      - Strictly non-Docker host; do not create /opt/docker or dockerops.
      - Host-local state lives under /opt/jellyoffice only.
      - 32-bit Raspberry Pi OS Lite armhf.
      - I2C verified: 0x23 ADS1015, 0x76 BME280.
      - Tailscale SSH enabled.

  seedbox:
    description: Remote seedbox / remote sync / backup helper
    roles:
      - remote-server
      - remote-sync
      - remote-backup
      - tailscale-exit-node
      - borg-target
