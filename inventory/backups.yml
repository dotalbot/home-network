# inventory/backups.yml

backup_classes:

  config-only:
    description: Service can be rebuilt from Git/config only.
    includes:
      - compose config
      - app config
    excludes:
      - cache
      - generated runtime data
    restore_priority: low

  appdata:
    description: Service has useful persistent appdata.
    includes:
      - /opt/docker/appdata/SERVICE
    excludes:
      - cache
      - logs
      - temp files
    restore_priority: medium

  appdata-and-database:
    description: Service has appdata and database state.
    includes:
      - /opt/docker/appdata/SERVICE
      - database dump or database volume
    excludes:
      - cache
      - temp files
    restore_priority: high

  sqlite-data:
    description: Service persists a local SQLite database under service appdata.
    includes:
      - /opt/docker/appdata/SERVICE
      - SQLite database files and WAL/SHM sidecars
    excludes:
      - cache
      - logs
      - temp files
    restore_priority: high

  postgres-volume-and-logical-dumps:
    description: PostgreSQL service with Borg-covered data directory plus logical dump artifacts.
    includes:
      - /opt/docker/appdata/postgres/data
      - /opt/docker/appdata/postgres/config
      - /opt/docker/appdata/postgres/logical-dumps
    excludes:
      - /opt/docker/.secrets
      - temporary dump directories
      - partial dump files
    restore_priority: critical

  appdata-and-library:
    description: Service has appdata plus media/library files.
    includes:
      - /opt/docker/appdata/SERVICE
      - library storage
    excludes:
      - cache
      - temp files
    restore_priority: high

  manyfold-appdata-central-postgres-and-library:
    description: Manyfold appdata on jellyhome plus central Postgres database state and 3D model library.
    includes:
      - /opt/docker/appdata/manyfold
      - central PostgreSQL database manyfold via postgres-volume-and-logical-dumps
      - /home/jellyfish/media/Primary_5TB/3D_models
    excludes:
      - /opt/docker/.secrets
      - cache
      - temp files
    restore_priority: high
    restore_verification: post-index logical dump restore verified into scratch postgres:17-alpine container

  config-and-persistence:
    description: Service has config and small persistent runtime state.
    includes:
      - /opt/docker/appdata/SERVICE/config
      - /opt/docker/appdata/SERVICE/data
    excludes:
      - cache
      - logs
    restore_priority: medium

  config-and-cache:
    description: Config should be backed up, cache is optional.
    includes:
      - /opt/docker/appdata/SERVICE/config
    excludes:
      - /opt/docker/appdata/SERVICE/cache
    restore_priority: low

  source-repo:
    description: Service can be rebuilt from a separate source repository plus this repo's Compose/config metadata.
    includes:
      - source repository remote and branch
      - compose config
      - deployment notes
    excludes:
      - generated build artifacts
      - caches
    restore_priority: low

  appdata-and-source-repo:
    description: Service needs both its source repository and persistent appdata/runtime state.
    includes:
      - source repository remote and branch
      - /opt/docker/appdata/SERVICE
      - compose config
      - deployment notes
    excludes:
      - caches
      - logs
      - temporary files
    restore_priority: high

  uploads-if-needed:
    description: Ephemeral upload/helper service where app uploads are backed up only if the service becomes operationally important.
    includes:
      - /opt/docker/appdata/SERVICE/uploads when retention is required
      - compose config
    excludes:
      - temporary uploads
      - cache
      - logs
    restore_priority: low

backup_defaults:
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 6
  checks:
    repository: true
    archives_frequency: 2 weeks
  schedule:
    on_calendar: "*-*-* 03:00:00"
    randomized_delay_sec: 30m
  notes:
    - Validation-only defaults for future render-only Borgmatic config generation.
    - Current live behavior still uses legacy host repository_path and important_paths fields.

destinations:
  primary:
    enabled: true
    type: borg_ssh
    host: jellybackup
    address: 192.168.1.75
    ssh_user: jellybackup
    transport: ssh
    address_policy: use_lan_ip_not_fqdn
    repository_path_template: /home/jellybackup/externaldisk/borg_{host}
    purpose: current LAN-only Borg destination
  secondary:
    enabled: false
    type: borg_ssh
    host: TBD
    address: TBD
    ssh_user: TBD
    transport: ssh
    address_policy: use_lan_ip_not_fqdn
    repository_path_template: TBD
    purpose: disabled future second/offsite destination placeholder; must stay disabled until a rollout card supplies concrete target details

primary_target:
  host: jellybackup
  lan_ip: 192.168.1.75
  ssh_user: jellybackup
  transport: ssh
  address_policy: use_lan_ip_not_fqdn
  reason: FQDN resolves over Tailscale and is too taxing on the Raspberry Pi backup host.
  ssh_status: ssh-copy-id has been completed from jellyhome, jellybase, and jellyberry.
  repo_status: destination repository directories already exist on jellybackup, one per server.

borgmatic_loki:
  enabled_hosts:
    - jellyberry
    - jellybase
    - jellyhome
  url: http://jellybase:3100/loki/api/v1/push
  labels:
    job: borgmatic
    environment: home-network
    backup_profile: default

borgmatic_mqtt:
  enabled_hosts:
    - jellyberry
    - jellybase
    - jellyhome
  broker_host: jellyhome
  broker_port: 1883
  username: borgmatic
  password_file: /opt/docker/.secrets/mqtt_borgmatic_password
  topic_prefix: home-network
  retain_state: true
  discord_target: discord:1505100652659867678:1507781022249648159
  notes: Jellymax Discord backup event thread target is configured; broker requires the dedicated borgmatic MQTT user, /opt/docker/.secrets/mqtt_borgmatic_password on backup hosts, and a service-readable /etc/home-network/mqtt_borgmatic_password copy on the bridge host.

hosts:


  jellyhome:
    borg_enabled: true
    host_type: docker
    role: primary-docker-dev-host
    repository_path: /home/jellybackup/externaldisk/borg_jellyhome
    destinations:
      primary:
        enabled: true
        repository_path: /home/jellybackup/externaldisk/borg_jellyhome
    rollout_status:
      config_status: validated
      latest_verified_archive: jellyhome-2026-05-23T09:40:36
      loki_log_shipping_status: verified
      metrics_status: verified
    important_paths:
      - /opt/docker
      - /home/jellyfish/repo
      - /home/jellyfish/media/Primary_5TB/3D_models
    backup_sets:
      - id: docker-root
        type: path
        backup_class: appdata
        paths:
          - /opt/docker
        destinations:
          - primary
        restore_metadata:
          docker_host: true
          restore_scope: host-level Docker config and appdata covered by existing Borgmatic source path
      - id: dev-repos
        type: source_repo
        backup_class: source-repo
        paths:
          - /home/jellyfish/repo
        destinations:
          - primary
        restore_metadata:
          restore_scope: developer checkout mirror; Git remotes remain the authoritative source for tracked repositories
      - id: model-library-3d
        type: media_library
        backup_class: appdata-and-library
        paths:
          - /home/jellyfish/media/Primary_5TB/3D_models
        destinations:
          - primary
        restore_metadata:
          restore_scope: Manyfold-visible 3D model library path
          related_restore_runbook: docs/runbooks/central-postgres-manyfold-restore.md
    notes:
      - Runs core management UI.
      - Runs planned Calibre and Mosquitto.
      - Dev repos may also be synced elsewhere.

  jellybase:
    borg_enabled: true
    host_type: docker
    role: secondary-monitoring-host
    repository_path: /home/jellybackup/externaldisk/borg_jellybase
    destinations:
      primary:
        enabled: true
        repository_path: /home/jellybackup/externaldisk/borg_jellybase
    rollout_status:
      config_status: validated
      latest_verified_archive: jellybase-2026-05-25T03:12:03
      loki_log_shipping_status: verified
      metrics_status: verified
      check_status: passed
      restore_test_status: passed
      timer_status: managed timer enabled
    important_paths:
      - /opt/docker
      - /home/jellyfish/repo
    backup_sets:
      - id: docker-root
        type: path
        backup_class: appdata
        paths:
          - /opt/docker
        destinations:
          - primary
        restore_metadata:
          docker_host: true
          restore_scope: monitoring stack Docker config, appdata, and generated local state already covered by /opt/docker
      - id: central-postgres-logical-dumps
        type: postgres_logical_dump
        backup_class: postgres-volume-and-logical-dumps
        paths:
          - /opt/docker/appdata/postgres/logical-dumps
        output_path: /opt/docker/appdata/postgres/logical-dumps
        database_hook:
          command: /opt/docker/bin/postgres-logical-dump
          run_before_backup: true
          failure_policy: fail_backup
          current_runtime: standalone timer remains in place until a later hook rollout phase
        destinations:
          - primary
        restore_runbook: docs/runbooks/central-postgres-manyfold-restore.md
        restore_metadata:
          restore_scope: logical dumps for central PostgreSQL databases; scratch restores stay default
      - id: dev-repos
        type: source_repo
        backup_class: source-repo
        paths:
          - /home/jellyfish/repo
        destinations:
          - primary
        restore_metadata:
          restore_scope: developer checkout mirror; Git remotes remain authoritative for tracked repositories
    notes:
      - Runs Prometheus and Grafana.
      - May hold synced dev mirror.

  jellyberry:
    borg_enabled: true
    host_type: docker
    role: raspberry-pi-lightweight-node
    repository_path: /home/jellybackup/externaldisk/borg_jellyberry
    destinations:
      primary:
        enabled: true
        repository_path: /home/jellybackup/externaldisk/borg_jellyberry
    rollout_status:
      package_status: installed
      root_ssh_status: verified
      repository_status: initialized
      config_status: validated
      latest_verified_archive: jellyberry-2026-05-23T09:23:49
      loki_log_shipping_status: verified
      metrics_status: verified
      check_status: passed
      restore_test_status: passed
      timer_status: enabled
    important_paths:
      - /opt/docker
    backup_sets:
      - id: docker-root
        type: path
        backup_class: appdata
        paths:
          - /opt/docker
        destinations:
          - primary
        restore_metadata:
          docker_host: true
          restore_scope: lightweight node Docker config, appdata, backup status, and local runtime files under /opt/docker
    notes:
      - Only back up if it has local state worth preserving.

  seedbox:
    borg_enabled: true
    host_type: remote
    role: remote-sync-backup-helper
    destinations:
      primary:
        enabled: false
        status: planned_repository_path_missing
    important_paths:
      - /opt/docker
      - /home/jellyfish
    backup_sets:
      - id: remote-docker-root
        type: path
        backup_class: appdata
        paths:
          - /opt/docker
        restore_metadata:
          restore_scope: future remote Docker payload; destination remains disabled until repo path and transport are confirmed
      - id: remote-home
        type: path
        backup_class: appdata
        paths:
          - /home/jellyfish
        restore_metadata:
          restore_scope: future remote user data payload; destination remains disabled until repo path and transport are confirmed
    notes:
      - May act as offsite sync or backup relay.


restore_rules:

  config-only:
    method: redeploy_from_git
    steps:
      - bootstrap host
      - clone home-network
      - sync docker config
      - deploy service

  appdata:
    method: restore_borg_then_deploy
    steps:
      - bootstrap host
      - restore /opt/docker/appdata/SERVICE from Borg
      - sync docker config
      - deploy service

  appdata-and-database:
    method: restore_data_and_database
    steps:
      - bootstrap host
      - restore appdata from Borg
      - restore database dump or volume
      - deploy service
      - verify application health

  sqlite-data:
    method: restore_sqlite_appdata_then_deploy
    steps:
      - bootstrap host
      - restore /opt/docker/appdata/SERVICE from Borg, including SQLite database and WAL/SHM sidecars when present
      - restore or clone source directory recorded in service metadata when the service is source-built
      - sync docker config
      - deploy service
      - verify HTTP/API health and expected database records

  postgres-volume-and-logical-dumps:
    method: restore_postgres_volume_or_logical_dump
    steps:
      - bootstrap host
      - restore /opt/docker/appdata/postgres from Borg
      - verify required secret files exist outside Git
      - deploy central-postgres
      - verify pg_isready
      - if volume restore is unusable, restore globals and per-database dumps from logical-dumps/latest

  appdata-and-library:
    method: restore_appdata_and_library
    steps:
      - bootstrap host
      - restore appdata from Borg
      - restore library/media path
      - deploy service
      - verify application health

  manyfold-appdata-central-postgres-and-library:
    method: restore_appdata_postgres_and_library
    steps:
      - bootstrap jellyhome and jellybase
      - restore /opt/docker/appdata/manyfold on jellyhome from Borg
      - restore central PostgreSQL using postgres-volume-and-logical-dumps rules on jellybase
      - restore or verify /home/jellyfish/media/Primary_5TB/3D_models
      - recreate required secret files under /opt/docker/.secrets without printing values
      - sync docker config and deploy manyfold plus manyfold-valkey
      - verify Manyfold HTTP health, database connectivity, and restored library/model/model-file counts

  config-and-persistence:
    method: restore_config_and_persistent_state
    steps:
      - bootstrap host
      - restore config and persistent data from Borg
      - deploy service
      - verify service health

  config-and-cache:
    method: restore_config_ignore_cache
    steps:
      - bootstrap host
      - restore config from Borg or redeploy config from Git
      - do not restore cache unless explicitly needed
      - deploy service
      - verify service health

  source-repo:
    method: restore_source_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - verify build context and Dockerfile exist
      - sync docker config
      - build and deploy service
      - verify service health

  appdata-and-source-repo:
    method: restore_source_and_appdata_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - restore /opt/docker/appdata/SERVICE from Borg
      - verify required host-local secrets exist
      - sync docker config
      - build and deploy service
      - verify service health

  uploads-if-needed:
    method: restore_uploads_if_retained_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - restore uploads from Borg only if retention is required
      - sync docker config
      - build and deploy service
      - verify service health
