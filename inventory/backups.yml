# inventory/backups.yml

backup_classes:

  config-only:
    description: Service can be rebuilt from Git/config only.
    includes:
      - compose config
      - app config
    excludes:
      - cache
      - generated runtime data
    restore_priority: low

  appdata:
    description: Service has useful persistent appdata.
    includes:
      - /opt/docker/appdata/SERVICE
    excludes:
      - cache
      - logs
      - temp files
    restore_priority: medium

  appdata-and-database:
    description: Service has appdata and database state.
    includes:
      - /opt/docker/appdata/SERVICE
      - database dump or database volume
    excludes:
      - cache
      - temp files
    restore_priority: high

  appdata-and-library:
    description: Service has appdata plus media/library files.
    includes:
      - /opt/docker/appdata/SERVICE
      - library storage
    excludes:
      - cache
      - temp files
    restore_priority: high

  config-and-persistence:
    description: Service has config and small persistent runtime state.
    includes:
      - /opt/docker/appdata/SERVICE/config
      - /opt/docker/appdata/SERVICE/data
    excludes:
      - cache
      - logs
    restore_priority: medium

  config-and-cache:
    description: Config should be backed up, cache is optional.
    includes:
      - /opt/docker/appdata/SERVICE/config
    excludes:
      - /opt/docker/appdata/SERVICE/cache
    restore_priority: low

  source-repo:
    description: Service can be rebuilt from a separate source repository plus this repo's Compose/config metadata.
    includes:
      - source repository remote and branch
      - compose config
      - deployment notes
    excludes:
      - generated build artifacts
      - caches
    restore_priority: low

  appdata-and-source-repo:
    description: Service needs both its source repository and persistent appdata/runtime state.
    includes:
      - source repository remote and branch
      - /opt/docker/appdata/SERVICE
      - compose config
      - deployment notes
    excludes:
      - caches
      - logs
      - temporary files
    restore_priority: high

  uploads-if-needed:
    description: Ephemeral upload/helper service where app uploads are backed up only if the service becomes operationally important.
    includes:
      - /opt/docker/appdata/SERVICE/uploads when retention is required
      - compose config
    excludes:
      - temporary uploads
      - cache
      - logs
    restore_priority: low


primary_target:
  host: jellybackup
  lan_ip: 192.168.1.75
  ssh_user: jellybackup
  transport: ssh
  address_policy: use_lan_ip_not_fqdn
  reason: FQDN resolves over Tailscale and is too taxing on the Raspberry Pi backup host.
  ssh_status: ssh-copy-id has been completed from jellyhome, jellybase, and jellyberry.
  repo_status: destination repository directories already exist on jellybackup, one per server.

borgmatic_loki:
  enabled_hosts:
    - jellyberry
    - jellybase
    - jellyhome
  url: http://jellybase:3100/loki/api/v1/push
  labels:
    job: borgmatic
    environment: home-network
    backup_profile: default

hosts:

  jellyhome:
    borg_enabled: true
    role: primary-docker-dev-host
    repository_path: /home/jellybackup/externaldisk/borg_jellyhome
    important_paths:
      - /opt/docker
      - /home/jellyfish/repo
    notes:
      - Runs core management UI.
      - Runs planned Calibre and Mosquitto.
      - Dev repos may also be synced elsewhere.

  jellybase:
    borg_enabled: true
    role: secondary-monitoring-host
    repository_path: /home/jellybackup/externaldisk/borg_jellybase
    important_paths:
      - /opt/docker
      - /home/jellyfish/repo
    notes:
      - Runs Prometheus and Grafana.
      - May hold synced dev mirror.

  jellyberry:
    borg_enabled: true
    role: raspberry-pi-lightweight-node
    repository_path: /home/jellybackup/externaldisk/borg_jellyberry
    rollout_status:
      package_status: installed
      root_ssh_status: verified
      repository_status: initialized
      config_status: validated
      latest_verified_archive: jellyberry-2026-05-23T09:23:49
      loki_log_shipping_status: verified
      check_status: passed
      restore_test_status: passed
      timer_status: enabled
    important_paths:
      - /opt/docker
    notes:
      - Only back up if it has local state worth preserving.

  seedbox:
    borg_enabled: true
    role: remote-sync-backup-helper
    important_paths:
      - /opt/docker
      - /home/jellyfish
    notes:
      - May act as offsite sync or backup relay.


restore_rules:

  config-only:
    method: redeploy_from_git
    steps:
      - bootstrap host
      - clone home-network
      - sync docker config
      - deploy service

  appdata:
    method: restore_borg_then_deploy
    steps:
      - bootstrap host
      - restore /opt/docker/appdata/SERVICE from Borg
      - sync docker config
      - deploy service

  appdata-and-database:
    method: restore_data_and_database
    steps:
      - bootstrap host
      - restore appdata from Borg
      - restore database dump or volume
      - deploy service
      - verify application health

  appdata-and-library:
    method: restore_appdata_and_library
    steps:
      - bootstrap host
      - restore appdata from Borg
      - restore library/media path
      - deploy service
      - verify application health

  config-and-persistence:
    method: restore_config_and_persistent_state
    steps:
      - bootstrap host
      - restore config and persistent data from Borg
      - deploy service
      - verify service health

  config-and-cache:
    method: restore_config_ignore_cache
    steps:
      - bootstrap host
      - restore config from Borg or redeploy config from Git
      - do not restore cache unless explicitly needed
      - deploy service
      - verify service health

  source-repo:
    method: restore_source_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - verify build context and Dockerfile exist
      - sync docker config
      - build and deploy service
      - verify service health

  appdata-and-source-repo:
    method: restore_source_and_appdata_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - restore /opt/docker/appdata/SERVICE from Borg
      - verify required host-local secrets exist
      - sync docker config
      - build and deploy service
      - verify service health

  uploads-if-needed:
    method: restore_uploads_if_retained_then_deploy
    steps:
      - bootstrap host
      - restore or clone source directory recorded in service metadata
      - restore uploads from Borg only if retention is required
      - sync docker config
      - build and deploy service
      - verify service health
