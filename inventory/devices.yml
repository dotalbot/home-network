    hostname: null
    role: docker_host_or_dashboard_node
    category: server
    mac: 2c:f0:5d:58:8e:09
    open_ports: [22, 1883, 3000, 8080, 9443]
    services:
      - port: 3000
        name: Home Network
        protocol: http
      - port: 8080
        name: Dozzle
        protocol: http
      - port: 9443
        name: Portainer
        protocol: https
      - port: 1883
