# Home LAN inventory, first pass.
# Source: safe discovery from jellyberry on 2026-05-21.
# Methods: neighbour cache, one-packet ICMP sweep, mDNS, light TCP connect checks, HTTP title fetches.
# Scope: 192.168.1.0/24 via eth0 only.

network:
  cidr: 192.168.1.0/24
  gateway: 192.168.1.254
  scanner_host: jellyberry
  scanner_ip: 192.168.1.159
  interface: eth0

devices:
